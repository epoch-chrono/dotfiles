---
# ────────────────────────────────────────────────────────────────────────────
# site.yml — entry point do playbook
# ────────────────────────────────────────────────────────────────────────────
# Versão atual: 0.9.1
#   - 0.1.0: role hello (smoke test)
#   - 0.2.0: + role macos-base (defaults declarativos)
#   - 0.3.0: + handlers em macos-base (killall cfprefsd/Finder/Dock/SystemUIServer)
#   - 0.4.0: macos-base refatorada em sub-arquivos por domínio
#            + tasks/general.yml: 24h, Locale en_BR, idiomas en/pt-BR,
#              Celsius, métricas, primeiro dia da semana = domingo,
#              software update automático (sudo)
#   - 0.4.1: fix AppleFirstWeekday — community.general 10.x não suporta
#            type:dict; aplicado via 'defaults write -dict-add' com check
#            prévio para preservar idempotência
#   - 0.5.0: + tasks/appearance.yml: Auto theme (Light/Dark), Accent Purple,
#            Highlight Purple (RGB normalizado), Sidebar icon size Small
#   - 0.6.0: + tasks/dock.yml: Dock size 48 / magnification 90,
#            Hot Corners desabilitados (todos os 4 cantos = sem ação)
#   - 0.6.1: fix dock — tilesize/largesize como type:float (macOS Tahoe
#            armazena como float no plist; type:int dava Type mismatch)
#   - 0.7.0: + tasks/trackpad.yml: tap-to-click (built-in + Bluetooth),
#            tracking speed 1.5, App Exposé com 3-finger swipe down,
#            tapBehavior por currentHost para apps legacy
#   - 0.7.1: fix trackpad — Clicking é int (0/1) no plist, não bool;
#            mesmo padrão do bug de tilesize/largesize do dock
#   - 0.8.0: + tasks/sharing.yml: hostname (ComputerName/HostName/
#            LocalHostName via scutil), Remote Login (SSH) via
#            systemsetup, Screen Sharing e File Sharing via launchctl
#            enable + kickstart. Consome a var target_hostname obrigatória.
#   - 0.8.1: rename MAC_HOSTNAME -> TARGET_HOSTNAME e mac_hostname ->
#            target_hostname. O bootstrap agora roda em Linux também,
#            então a var precisa ser neutra em relação a OS.
#   - 0.8.2: fix sharing — Screen/File Sharing com cadeia robusta
#            (bootstrap → fallback load -w → enable → kickstart) +
#            best-effort com aviso ao final se não habilitou. Em macOS
#            Tahoe/Sequoia, 'launchctl enable system/com.apple.smbd'
#            falha com "Could not find service" se o plist nunca foi
#            bootstrapped no system domain.
#   - 0.9.0: + tasks/firewall.yml: Application Firewall via socketfilterfw
#            (globalstate on, stealthmode on, loggingmode on com loggingopt
#            detail, allowsigned on, allowsignedapp on, blockall off).
#            Idempotente via shell único com contador de mudanças (CHANGES=N).
#            Detecta MDM profile management e aborta com mensagem clara
#            se settings estão gerenciados (não modificáveis via CLI).
#   - 0.9.1: fix firewall — refatoração completa. Versão anterior fazia
#            check+set por flag em loop com 'set -e'; em macOS Tahoe o
#            daemon reinicia ao mudar stealthmode, e a próxima chamada
#            --get retorna rc 255 antes do daemon ficar pronto. Solução:
#            aplicar todas as flags numa ÚNICA invocação do socketfilterfw
#            (sintaxe documentada). Idempotência via diff antes/depois.
#
# Executar:
#   cd ~/.local/share/dotfiles/ansible
#   ~/.cache/dotfiles-bootstrap/venv/bin/ansible-playbook site.yml
#
# Ou, mais comum: chamar via bootstrap.sh (Etapa 8) automaticamente.
#
# Tags úteis:
#   --tags hello           # Só smoke test
#   --tags macos-base      # Toda a role macos-base
#   --tags general         # Só general (24h, locale, autocorrect)
#   --tags appearance      # Só appearance (tema, cores, sidebar)
#   --tags dock            # Só Dock + hot corners
#   --tags trackpad        # Só trackpad (tap, speed, gestures)
#   --tags sharing         # Só sharing (hostname + daemons)
#   --tags firewall        # Só firewall (Application Firewall)
#   --tags keyboard        # Só teclado
#   --tags finder          # Só Finder
#   --skip-tags hello      # Tudo menos smoke test
# ────────────────────────────────────────────────────────────────────────────

- name: "Provisioning do host local"
  hosts: localhost
  gather_facts: true

  roles:
    # Smoke test — valida a chain bootstrap -> ansible -> become.
    - role: hello
      tags:
        - hello
        - smoke

    # macOS defaults declarativos.
    # Skip automático em Linux via 'when'.
    - role: macos-base
      when: ansible_facts.system == "Darwin"
      tags:
        - macos-base
        - macos
