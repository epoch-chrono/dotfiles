---
# ────────────────────────────────────────────────────────────────────────────
# site.yml — entry point do playbook
# ────────────────────────────────────────────────────────────────────────────
# Versão atual: 0.13.2
#   - 0.1.0: role hello (smoke test)
#   - 0.2.0: + role macos-base (defaults declarativos)
#   - 0.3.0: + handlers em macos-base (killall cfprefsd/Finder/Dock/SystemUIServer)
#   - 0.4.0: macos-base refatorada em sub-arquivos por domínio
#            + tasks/general.yml: 24h, Locale en_BR, idiomas en/pt-BR,
#              Celsius, métricas, primeiro dia da semana = domingo,
#              software update automático (sudo)
#   - 0.4.1: fix AppleFirstWeekday — community.general 10.x não suporta
#            type:dict; aplicado via 'defaults write -dict-add' com check
#            prévio para preservar idempotência
#   - 0.5.0: + tasks/appearance.yml: Auto theme (Light/Dark), Accent Purple,
#            Highlight Purple (RGB normalizado), Sidebar icon size Small
#   - 0.6.0: + tasks/dock.yml: Dock size 48 / magnification 90,
#            Hot Corners desabilitados (todos os 4 cantos = sem ação)
#   - 0.6.1: fix dock — tilesize/largesize como type:float (macOS Tahoe
#            armazena como float no plist; type:int dava Type mismatch)
#   - 0.7.0: + tasks/trackpad.yml: tap-to-click (built-in + Bluetooth),
#            tracking speed 1.5, App Exposé com 3-finger swipe down,
#            tapBehavior por currentHost para apps legacy
#   - 0.7.1: fix trackpad — Clicking é int (0/1) no plist, não bool;
#            mesmo padrão do bug de tilesize/largesize do dock
#   - 0.8.0: + tasks/sharing.yml: hostname (ComputerName/HostName/
#            LocalHostName via scutil), Remote Login (SSH) via
#            systemsetup, Screen Sharing e File Sharing via launchctl
#            enable + kickstart. Consome a var target_hostname obrigatória.
#   - 0.8.1: rename MAC_HOSTNAME -> TARGET_HOSTNAME e mac_hostname ->
#            target_hostname. O bootstrap agora roda em Linux também,
#            então a var precisa ser neutra em relação a OS.
#   - 0.8.2: fix sharing — Screen/File Sharing com cadeia robusta
#            (bootstrap → fallback load -w → enable → kickstart) +
#            best-effort com aviso ao final se não habilitou. Em macOS
#            Tahoe/Sequoia, 'launchctl enable system/com.apple.smbd'
#            falha com "Could not find service" se o plist nunca foi
#            bootstrapped no system domain.
#   - 0.9.0: + tasks/firewall.yml: Application Firewall via socketfilterfw
#            (globalstate on, stealthmode on, loggingmode on com loggingopt
#            detail, allowsigned on, allowsignedapp on, blockall off).
#            Idempotente via shell único com contador de mudanças (CHANGES=N).
#            Detecta MDM profile management e aborta com mensagem clara
#            se settings estão gerenciados (não modificáveis via CLI).
#   - 0.9.1: fix firewall — refatoração completa. Versão anterior fazia
#            check+set por flag em loop com 'set -e'; em macOS Tahoe o
#            daemon reinicia ao mudar stealthmode, e a próxima chamada
#            --get retorna rc 255 antes do daemon ficar pronto. Solução:
#            aplicar todas as flags numa ÚNICA invocação do socketfilterfw
#            (sintaxe documentada). Idempotência via diff antes/depois.
#   - 0.9.2: fix firewall — Apple REMOVEU as flags de logging em macOS
#            Tahoe (--getloggingmode, --setloggingmode, --getloggingopt,
#            --setloggingopt). O man page atual não menciona, e
#            socketfilterfw retorna 'usage:' (rc não-zero) ao recebê-las.
#            Removidas do playbook. Logging agora deve ser gerenciado via
#            unified logging subsystem com.apple.alf (fora do escopo).
#   - 0.10.0: + role homebrew (instalação mínima — só o binary em
#             /opt/homebrew/bin/brew). Usa installer oficial com
#             NONINTERACTIVE=1, depende do NOPASSWD sudo configurado pelo
#             bootstrap. Sem tap, sem packages, sem shell integration —
#             tudo isso fica para iterações futuras. Skip automático em
#             Linux via when:Darwin na role.
#   - 0.11.0: + homebrew/tasks/packages.yml + files/Brewfile. Aplica
#             pacotes declarativamente via 'brew bundle --no-upgrade'.
#             Brewfile inicial reflete curadoria de taps externos do Mac
#             antigo: hudochenkov/sshpass (binary C estável, sem alternativa
#             mise), common-fate/granted (releases hospedadas fora do
#             GitHub, mise quebra), cloudquery/tap e turbot/tap (não
#             testados em mise ainda; mantidos conservadores). Linguagem
#             base: python@3.13. Built-ins do brew (homebrew/bundle e
#             homebrew/services desde brew 4.5.0) NÃO entram no Brewfile —
#             precisam ser untaped manualmente no Mac antigo durante
#             migração. Idempotência via parsing de "Installing"/"Tapping"
#             no stdout do brew bundle.
#   - 0.11.1: fix homebrew/main.yml — import_tasks de packages.yml estava
#             duplicado (erro de str_replace no commit anterior). Resultado
#             visível no output: brew bundle rodava 2 vezes por execução.
#             Inofensivo (segunda vez vinha "Using everything"), mas
#             confuso e desperdiça tempo. Removida a duplicata.
#   - 0.12.0: Brewfile expandido — curadoria completa de formulas do Mac
#             antigo após análise de "brew leaves --installed-on-request"
#             vs mise registry. Total: 67 entradas (4 taps + 4 formulas-de-
#             tap + 59 core). Estrutura por categoria com comentários
#             contextualizando cada bloco:
#               1. Taps externos (sshpass, granted, cloudquery, powerpipe)
#               2. Brew pre-reqs: linguagens base (python@3.13, elixir,
#                  rust). Coexistem com mise; mise vence no PATH pra uso
#                  diário, brew fica como "system runtime" pra deps.
#               3. Brew pre-reqs: build/image universal (make, imagemagick).
#                  Muitas formulas brew dependem, manter aqui evita
#                  duplicacao.
#               4. System replacements GNU/newer-than-system: binutils,
#                  diffutils, file-formula, findutils, gawk, git, gnu-*,
#                  gnupg, gpatch, grep, gzip, less, openssh, rsync, wget,
#                  bash-completion@2.
#               5. Shells: fish, fish-lsp, zsh, zsh-completions, nushell,
#                  elvish.
#               6. Mac-specific: duti, maclaunch, pinentry-mac.
#               7. Network/security: clamav, mtr, nmap, p7zip, socat,
#                  tcpdump, tcpflow.
#               8. Container/cloud: podman-compose, mongodb-atlas-cli,
#                  kubescape, prowler.
#               9. CLI utilities: asciinema, bfg, bitwarden-cli, bore-cli,
#                  cpulimit, dateutils, detox, dos2unix, exercism,
#                  graphviz, gtop, himalaya, magic-wormhole, ponysay,
#                  summarize, sysbench, timewarrior, tree, watch.
#              10. Formulas dos taps: sshpass, granted, cloudquery,
#                  powerpipe.
#             Foram para o mise: btop, fastfetch, mas, tmux, postgresql.
#             Foram removidos (obsoletos no stack atual): stow (chezmoi
#             cobre), screen (tmux), colordiff (delta via mise),
#             reattach-to-user-namespace (desnecessario desde tmux 2.6),
#             telnet (nc -zv cobre).
#   - 0.13.0: + mise, chezmoi e mas ao Brewfile numa nova categoria
#             "Provisioning managers". Decisao arquitetural: instalar
#             essas 3 tools via brew (mesmo que fiquem 1 minor atras do
#             upstream) simplifica o bootstrap — colapsa as roles
#             dedicadas "mise" e "chezmoi-init" que estavam no roadmap.
#             Lifecycle unificado:
#               - mas no Brewfile: brew bundle suporta diretiva nativa
#                 'mas "AppName", id: 1234567890', dump/cleanup capturam
#                 apps Mac App Store automaticamente.
#               - mise via brew: 1 minor de delay aceitavel pra ganho
#                 de simplicidade. Coexiste com brew pre-reqs (vence no
#                 PATH via shellenv).
#               - chezmoi via brew: mesmo raciocinio. A pasta chezmoi/
#                 do repo passa a ser gerenciada por ele.
#             Resultado: 70 formulas no Brewfile total (3 novas).
#             Proximo passo do roadmap eh role minima 'chezmoi-bootstrap'
#             que apos brew bundle aplicar, roda chezmoi init + apply.
#   - 0.13.1: fix Brewfile — remove bloco duplicado de mise/chezmoi/mas
#             criado por race condition de commits paralelos (commit do
#             Vitor 83c4e8e e meu 973c9fc ambos adicionaram a categoria,
#             em paginas diferentes do arquivo). Mantida a versao mais
#             concisa (do Vitor) sob secao "Provisioning / version
#             management". Tambem removido "mas" da lista de tools do
#             mise no header (vestigio da decisao revisada — mas voltou
#             pro brew).
#   - 0.13.2: fix Brewfile — re-inserido o bloco Provisioning /
#             version management. O fix de 0.13.1 acabou removendo
#             AMBAS as ocorrencias de mise/chezmoi/mas, nao so a
#             duplicata. Bug do str_replace: o pattern casou em
#             posicao errada. Verificado o resultado contando
#             ocorrencias: 70 formulas (vs 67 antes do v0.13.0).
#   - 0.13.1: fix Brewfile — secao "Provisioning managers" estava
#             duplicada. O commit 0.13.0 introduziu DOIS blocos com
#             os mesmos 3 brews (mise, chezmoi, mas): um chamado
#             "Provisioning / version management" e outro "Provisioning
#             managers (instalados via brew para simplificar bootstrap)".
#             Inofensivo em termos de funcionamento (brew bundle dedup
#             internamente — output ja mostra "Using mise" so uma vez),
#             mas confuso e desperdicava espaco visual. Removida a
#             primeira (menos detalhada), mantida a segunda (com
#             comentarios por formula).

#
# Executar:
#   cd ~/.local/share/dotfiles/ansible
#   ~/.cache/dotfiles-bootstrap/venv/bin/ansible-playbook site.yml
#
# Ou, mais comum: chamar via bootstrap.sh (Etapa 8) automaticamente.
#
# Tags úteis:
#   --tags hello           # Só smoke test
#   --tags macos-base      # Toda a role macos-base
#   --tags general         # Só general (24h, locale, autocorrect)
#   --tags appearance      # Só appearance (tema, cores, sidebar)
#   --tags dock            # Só Dock + hot corners
#   --tags trackpad        # Só trackpad (tap, speed, gestures)
#   --tags sharing         # Só sharing (hostname + daemons)
#   --tags firewall        # Só firewall (Application Firewall)
#   --tags keyboard        # Só teclado
#   --tags finder          # Só Finder
#   --tags homebrew        # Só Homebrew (instalação)
#   --skip-tags hello      # Tudo menos smoke test
# ────────────────────────────────────────────────────────────────────────────

- name: "Provisioning do host local"
  hosts: localhost
  gather_facts: true

  roles:
    # Smoke test — valida a chain bootstrap -> ansible -> become.
    - role: hello
      tags:
        - hello
        - smoke

    # macOS defaults declarativos.
    # Skip automático em Linux via 'when'.
    - role: macos-base
      when: ansible_facts.system == "Darwin"
      tags:
        - macos-base
        - macos

    # Homebrew — apenas a instalação do binary. Sem tap, sem packages, sem
    # shell integration por enquanto. Pacotes ficam para iteração futura.
    # Skip automático em Linux via 'when' dentro da role.
    - role: homebrew
      when: ansible_facts.system == "Darwin"
      tags:
        - homebrew
