# ────────────────────────────────────────────────────────────────────────────
# ansible.cfg — configuração local do projeto
# ────────────────────────────────────────────────────────────────────────────
# Ansible procura este arquivo automaticamente quando ansible-playbook é
# executado a partir do diretório que o contém.
#
# Refs:
#   https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# ────────────────────────────────────────────────────────────────────────────

[defaults]
# Caminhos relativos ao diretório do ansible.cfg
inventory          = ./inventory/localhost.yml
roles_path         = ./roles
collections_path   = ./collections

# Não criar arquivos .retry após falhas (poluem o repo)
retry_files_enabled = false

# Usar o interpretador Python detectado pelo Ansible no host alvo, em silêncio
# (evita warning sobre interpreter discovery em cada run)
interpreter_python = auto_silent

# Mostrar argumentos passados a cada task (útil pra debug, ofuscar com no_log)
# display_args_to_stdout = false

# Não verificar host_key em conexões SSH (irrelevante pra connection: local
# mas útil quando expandirmos pra hosts remotos no futuro)
host_key_checking = false

# Stdout callback padrão. Outras opções: yaml, json, minimal, dense.
stdout_callback = default

[inventory]
# Cache de inventory desabilitado (irrelevante pra inventory estático local)
cache = false

[ssh_connection]
# Pipelining acelera execuções via SSH, sem efeito em connection: local
pipelining = true
