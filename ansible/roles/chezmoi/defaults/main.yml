---
# ────────────────────────────────────────────────────────────────────────────
# roles/chezmoi/defaults/main.yml
# ────────────────────────────────────────────────────────────────────────────

# Repo de onde o chezmoi vai clonar a source de dotfiles. Usar HTTPS pra
# não depender de SSH agent durante bootstrap. Como o repo é público, não
# precisa de credenciais.
chezmoi_repo: "https://github.com/epoch-chrono/dotfiles.git"

# Path absoluto pro binary do chezmoi. Hardcoded pra evitar problemas de PATH
# em SSH non-interactive. Brew instala em /opt/homebrew/bin (Apple Silicon)
# ou /usr/local/bin (Intel). Como este projeto target é Apple Silicon, o
# default é Apple Silicon.
chezmoi_binary: "/opt/homebrew/bin/chezmoi"

# Path do binary do mise — mesma justificativa do chezmoi_binary acima.
mise_binary: "/opt/homebrew/bin/mise"

# Path do binary do op (1Password CLI). Usado pela task "Mise — resolver
# GITHUB_API_TOKEN via op" quando OP_SERVICE_ACCOUNT_TOKEN é a forma de
# auth escolhida pelo bootstrap.
op_binary: "/opt/homebrew/bin/op"

# UUIDs do item 1P que armazena o PAT do GitHub pro mise install. Usados
# pela task "Mise — resolver GITHUB_API_TOKEN via op". UUIDs em vez de
# nomes porque:
#   - Estáveis (não mudam ao renomear vault/item)
#   - O vault tem '/' no nome ('00-personal/01-chezmoi') que quebra
#     parsing de paths em alguns flags do op
#   - Em repo público, UUIDs revelam só metadata (existe vault X, item Y)
#     mas em si não dão acesso sem auth completa
github_pat_vault_uuid: "niarnlvrteesurkbocpta7it4e"  # vault: 00-personal/01-chezmoi
github_pat_item_uuid: "x63sxispbdoahpxchnq3ji3scq"   # item: api-key/github.com/.../chezmoi-bootstrap

# UUIDs do item 1P que armazena o PAT do GitLab (OPCIONAL — só é
# consultado se o config.toml usa backend `gitlab:owner/repo` ou se o
# user quer elevar rate limit do GitLab. PAT criado com scope mínimo
# `read_api` — ver docs/ROADMAP.md "GitLab token / rate limit".
# Mesmo vault do GitHub (00-personal/01-chezmoi).
gitlab_pat_vault_uuid: "niarnlvrteesurkbocpta7it4e"  # vault: 00-personal/01-chezmoi
gitlab_pat_item_uuid: "ics64ncwjljnlq4iheus7zp3k4"   # item: api-key/gitlab.com/.../chezmoi-bootstrap

# ── Mise install em fases ──────────────────────────────────────────────────
# Pra isolar falhas e dar mensagens mais claras, dividimos `mise install`
# em 3 etapas:
#   Fase 1 — cores linguagem (precisam funcionar; se falhar, abort)
#   Fase 2 — backends pré-reqs (idem; uv/aube alimentam pipx:/npm:)
#   Fase 3 — todo o resto (com retry + failed_when: false; registra falhas)
#
# Listas abaixo contêm APENAS NOMES das tools — versões continuam só no
# dot_config/mise/config.toml.tmpl (single source of truth). `mise install
# python` (sem @versão) lê a versão do config.toml e instala.

mise_core_tools:
  - python          # 3.13.11 + 2.7.18 (multi-version)
  - node            # lts
  - java            # lts
  - go              # 1.26.3
  - rust            # 1.95.0
  - ruby            # 3.4.9
  - elixir          # 1.19.5-otp-28
  - erlang          # 28.5
  - perl            # 5.42.2

mise_backend_tools:
  - aqua            # backend aqua:
  - uv              # backend pipx: (via uv)
  - pipx            # backend pipx: (fallback se uv quebrar)
  - aube            # backend npm: (via aube)
  - npm             # backend npm: (fallback se aube quebrar)
  - usage           # mise usa pra completions
  - sqlite          # dependência de algumas tools
