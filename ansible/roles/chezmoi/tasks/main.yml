---
# ────────────────────────────────────────────────────────────────────────────
# roles/chezmoi/tasks/main.yml
# ────────────────────────────────────────────────────────────────────────────
# Ordem das fases:
#   1. Pré-check do chezmoi binary (vem do Brewfile)
#   2. Chezmoi init (clone do source pra ~/.local/share/chezmoi/) — primeira vez
#   3. Chezmoi update (pull source + apply) — sempre
#   4. Mise trust (autoriza o config materializado pelo apply)
#   5. Mise install (instala tools declarados em ~/.config/mise/config.toml)
#
# Notas arquiteturais:
#   - Apesar do bootstrap.sh já clonar o repo em ~/.local/share/dotfiles/,
#     o chezmoi tem source dir próprio (~/.local/share/chezmoi/). Duplicação
#     de espaço (~poucos MB) mas zero acoplamento.
#   - Usamos `chezmoi update` (NÃO `chezmoi apply`) na fase 3 porque update
#     faz `git pull` no source dir ANTES de aplicar. Sem o pull, mudanças
#     commitadas no repo nunca chegariam ao chezmoi — o source do chezmoi
#     ficaria preso na versão da primeira execução (`chezmoi init`).
#   - Mise trust + install rodam aqui (não em hook chezmoi run_onchange)
#     pra ter visibilidade no PLAY RECAP e stderr completo em caso de falha.
# ────────────────────────────────────────────────────────────────────────────


# ── 1. Pré-check ──────────────────────────────────────────────────────────

- name: "Chezmoi — verificar binary instalado"
  ansible.builtin.stat:
    path: "{{ chezmoi_binary }}"
  register: chezmoi_binary_check

- name: "Chezmoi — abortar se binary não encontrado"
  ansible.builtin.fail:
    msg: |
      {{ chezmoi_binary }} não encontrado. A role homebrew deveria ter
      instalado via Brewfile. Re-roda o playbook a partir do início.
  when: not chezmoi_binary_check.stat.exists


# ── 2. Chezmoi init ───────────────────────────────────────────────────────
# Clone source no primeiro run. Idempotente via stat check.

- name: "Chezmoi — verificar se source já foi inicializado"
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/share/chezmoi/.git"
  register: chezmoi_source_check

- name: "Chezmoi — init (clone source na primeira vez)"
  ansible.builtin.command: "{{ chezmoi_binary }} init {{ chezmoi_repo }}"
  when: not chezmoi_source_check.stat.exists
  changed_when: true


# ── 3. Chezmoi update ─────────────────────────────────────────────────────
# `chezmoi update` faz `git pull` no source dir (~/.local/share/chezmoi/)
# e depois aplica. Resolve o problema de source desatualizado: bootstrap.sh
# atualiza ~/.local/share/dotfiles/ mas chezmoi tem source próprio. Sem
# update, mudanças commitadas no repo só aparecem no chezmoi após manual
# git pull no source dir dele.
#
# Flags:
#   --verbose: imprime cada arquivo que mudou. stdout vazio = nada mudou.
#   --no-tty:  não tenta abrir /dev/tty. Em SSH non-interactive (rodando
#              o bootstrap remoto via ssh "comando"), não há TTY e a
#              tentativa quebra com "could not open a new TTY: open
#              /dev/tty: device not configured".
#   --force:   sobrescreve arquivos no destino mesmo que tenham sido
#              modificados desde o último apply do chezmoi. Necessário
#              porque (a) o user pode rm-rf manualmente arquivos
#              gerenciados em algum cleanup e (b) chezmoi rastreia hash
#              do que materializou — sem --force ele bloqueia esperando
#              decisão interativa "overwrite? skip? merge?".
#
# Combinação --no-tty --force = idempotente e seguro pra automation.
# Idempotente: sem mudanças, stdout vazio.

- name: "Chezmoi — update (pull source + materializar dotfiles em $HOME)"
  ansible.builtin.command: "{{ chezmoi_binary }} update --verbose --no-tty --force"
  register: chezmoi_update_result
  changed_when: chezmoi_update_result.stdout | length > 0

- name: "Chezmoi — exibir output do update (apenas se houve mudanças)"
  ansible.builtin.debug:
    msg: "{{ chezmoi_update_result.stdout_lines }}"
  when: chezmoi_update_result.stdout_lines | length > 0


# ── 4. Mise trust ─────────────────────────────────────────────────────────
# mise pede confirmação interativa em config novo (proteção contra config
# malicioso em projetos random). Em automation isso quebra (sem TTY).
# `mise trust` whitelista o path; persiste em ~/.local/state/mise/.

- name: "Mise — verificar binary instalado"
  ansible.builtin.stat:
    path: "{{ mise_binary }}"
  register: mise_binary_check

- name: "Mise — trust user config materializado pelo chezmoi"
  ansible.builtin.command: "{{ mise_binary }} trust {{ ansible_env.HOME }}/.config/mise/config.toml"
  changed_when: false
  when: mise_binary_check.stat.exists


# ── 5. Mise install ───────────────────────────────────────────────────────
# Instala tools declaradas em ~/.config/mise/config.toml. Idempotente —
# mise pula tools já instaladas na versão certa. Pode demorar na primeira
# run (compila Python, baixa Node, Go).
#
# Auth GitHub: bootstrap.sh exige GITHUB_API_TOKEN OU OP_SERVICE_ACCOUNT_TOKEN.
# Resolvemos qual usar aqui:
#
#   - Se GITHUB_API_TOKEN setada: usa direto (sem chamada extra).
#   - Se só OP_SERVICE_ACCOUNT_TOKEN: chama 'op item get' pra puxar PAT
#     do 1Password. Op CLI vem do Brewfile (já instalado pela role
#     anterior). Service account não requer 1P.app signed-in.
#   - Se nenhuma: bootstrap.sh já abortou; nunca chegaríamos aqui.

- name: "Mise — resolver GITHUB_API_TOKEN via op (se OP_SERVICE_ACCOUNT_TOKEN setado e GITHUB_API_TOKEN ausente)"
  ansible.builtin.command:
    cmd: >-
      {{ op_binary | default('/opt/homebrew/bin/op') }}
      item get '{{ github_pat_item_uuid }}'
      --vault '{{ github_pat_vault_uuid }}'
      --fields credential --reveal
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  register: github_pat_from_op
  changed_when: false
  no_log: true
  when:
    - mise_binary_check.stat.exists
    - lookup('env', 'GITHUB_API_TOKEN', default='') | length == 0
    - lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN', default='') | length > 0

- name: "Mise — exibir qual fonte de auth GitHub está em uso"
  ansible.builtin.debug:
    msg: >-
      {% if lookup('env', 'GITHUB_API_TOKEN', default='') | length > 0 %}
      Fonte: GITHUB_API_TOKEN env (PAT direto, propagado via Ansible)
      {% elif lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN', default='') | length > 0 %}
      Fonte: OP_SERVICE_ACCOUNT_TOKEN env → op item get → PAT resolvido em runtime
      {% else %}
      AVISO: nenhuma fonte de auth GitHub encontrada — mise install ficará anônimo (rate limit 60 req/h)
      {% endif %}
  when: mise_binary_check.stat.exists

# ── Resolver GITLAB_TOKEN via op (OPCIONAL) ───────────────────────────────
# GitLab token é opcional — só é usado se o config.toml declara tools via
# backend `gitlab:owner/repo` (no momento, nenhum tool do user) OU se o
# user quer elevar rate limit ao baixar releases do gitlab.com.
#
# Roda APENAS quando:
#   - OP_SERVICE_ACCOUNT_TOKEN está setada (service account tem read_items
#     no vault 00-personal/01-chezmoi)
#   - Nenhuma das 3 env vars GitLab está setada (GITLAB_TOKEN /
#     MISE_GITLAB_TOKEN / MISE_GITLAB_ENTERPRISE_TOKEN)
#
# failed_when: false — se o item não existir (user não criou PAT GitLab
# ainda), apenas pula. GitLab é opcional, não bloqueia bootstrap.

- name: "Mise — resolver GITLAB_TOKEN via op (opcional — só se OP_SERVICE_ACCOUNT_TOKEN setado e nenhuma var GitLab presente)"
  ansible.builtin.command:
    cmd: >-
      {{ op_binary | default('/opt/homebrew/bin/op') }}
      item get '{{ gitlab_pat_item_uuid }}'
      --vault '{{ gitlab_pat_vault_uuid }}'
      --fields credential --reveal
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  register: gitlab_pat_from_op
  changed_when: false
  no_log: true
  failed_when: false   # item ausente OK — GitLab é opcional
  when:
    - mise_binary_check.stat.exists
    - lookup('env', 'GITLAB_TOKEN', default='') | length == 0
    - lookup('env', 'MISE_GITLAB_TOKEN', default='') | length == 0
    - lookup('env', 'MISE_GITLAB_ENTERPRISE_TOKEN', default='') | length == 0
    - lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN', default='') | length > 0

- name: "Mise — exibir status do GitLab token (opcional)"
  ansible.builtin.debug:
    msg: >-
      {% if lookup('env', 'MISE_GITLAB_TOKEN', default='') | length > 0 %}
      GitLab: MISE_GITLAB_TOKEN env (PAT direto)
      {% elif lookup('env', 'GITLAB_TOKEN', default='') | length > 0 %}
      GitLab: GITLAB_TOKEN env (PAT direto)
      {% elif (gitlab_pat_from_op.rc | default(1)) == 0 and (gitlab_pat_from_op.stdout | default('') | length) > 0 %}
      GitLab: resolvido via op item get (UUID {{ gitlab_pat_item_uuid }})
      {% else %}
      GitLab: nenhum token (OK se config.toml não usa backend gitlab:)
      {% endif %}
  when: mise_binary_check.stat.exists

# ── Mise install em 3 fases (isolamento de falhas) ────────────────────────
# Estratégia: separar install em fases pra (a) diagnosticar onde quebrou
# se algo der erro e (b) tolerar falhas em tools não-críticas sem abortar
# o bootstrap inteiro.
#
#   Fase 1 — cores linguagem: precisa funcionar. Sem fail tolerance.
#            Tools listadas em `mise_core_tools` (defaults/main.yml).
#            Mise lê versões do ~/.config/mise/config.toml.
#
#   Fase 2 — backends pré-reqs: precisa funcionar. aqua/uv/aube alimentam
#            os installs subsequentes via backends pipx:/npm:/aqua:.
#            Tools listadas em `mise_backend_tools` (defaults/main.yml).
#
#   Fase 3 — tudo o resto: `mise install` (sem args) instala o que ainda
#            falta. Tolera falhas individuais (network transient, asset
#            removido) com `failed_when: false` + retry. No fim, exibe
#            resumo do que sobrou faltando pra ação manual.
#
# Listas em defaults/main.yml contêm APENAS NOMES — versões continuam só
# no config.toml.tmpl (single source of truth).

# Bloco de env vars de auth GitHub/GitLab — reaproveitado em todas as
# fases via YAML anchor. Mise resolve token na ordem oficial.

- name: "Mise — install: Fase 1 (cores linguagem)"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} install {{ mise_core_tools | join(' ') }}"
    chdir: "{{ ansible_user_dir }}"   # $HOME — evita mise.toml repo-level
  environment: &mise_install_env
    # PATH explícito com brew bins pra garantir que mise encontre tools do
    # ambiente brew durante o install (gpg, ag, curl, etc.). Sem isso,
    # ansible_env.PATH pode não incluir /opt/homebrew/bin/ dependendo de
    # como o playbook foi invocado (bootstrap.sh via SSH herda PATH do
    # shell de login que pode diferir), causando WARN como
    # 'mise WARN gpg not found' mesmo com gnupg instalado.
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_env.PATH }}"
    GITHUB_API_TOKEN: >-
      {{ lookup('env', 'GITHUB_API_TOKEN', default='')
         if lookup('env', 'GITHUB_API_TOKEN', default='') | length > 0
         else (github_pat_from_op.stdout | default('')) }}
    GITHUB_TOKEN: >-
      {{ lookup('env', 'GITHUB_API_TOKEN', default='')
         if lookup('env', 'GITHUB_API_TOKEN', default='') | length > 0
         else (github_pat_from_op.stdout | default('')) }}
    MISE_GITLAB_TOKEN: "{{ lookup('env', 'MISE_GITLAB_TOKEN', default='') }}"
    GITLAB_TOKEN: >-
      {{ lookup('env', 'GITLAB_TOKEN', default='')
         if lookup('env', 'GITLAB_TOKEN', default='') | length > 0
         else (gitlab_pat_from_op.stdout | default('') if (gitlab_pat_from_op.rc | default(1)) == 0 else '') }}
    MISE_GITLAB_ENTERPRISE_TOKEN: "{{ lookup('env', 'MISE_GITLAB_ENTERPRISE_TOKEN', default='') }}"
  register: mise_phase1
  changed_when: mise_phase1.stdout | length > 0
  # SEM failed_when: false — cores precisam funcionar. Se Python ou Node
  # falham, bootstrap aborta porque o resto depende deles.
  when: mise_binary_check.stat.exists

- name: "Mise — install: Fase 2 (backends pré-reqs)"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} install {{ mise_backend_tools | join(' ') }}"
    chdir: "{{ ansible_user_dir }}"   # $HOME — evita mise.toml repo-level
  environment: *mise_install_env
  register: mise_phase2
  changed_when: mise_phase2.stdout | length > 0
  # SEM failed_when: false — backends precisam funcionar. Sem aqua/uv/
  # aube, os tools com backends pipx:/npm:/aqua: vão falhar todos na
  # fase 3.
  when: mise_binary_check.stat.exists

- name: "Mise — install: Fase 3 (todas as outras tools, com retry + tolerante a falhas)"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} install"
    chdir: "{{ ansible_user_dir }}"   # $HOME — evita mise.toml repo-level
  environment: *mise_install_env
  register: mise_phase3
  retries: 2
  delay: 30
  until: mise_phase3.rc == 0
  changed_when: mise_phase3.stdout | length > 0
  failed_when: false   # tolera falhas individuais — registra na próxima task
  when: mise_binary_check.stat.exists

- name: "Mise — listar tools que ainda faltam após instalação"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} ls --missing"
  register: mise_missing
  changed_when: false
  failed_when: false
  when: mise_binary_check.stat.exists

- name: "Mise — exibir resumo final da instalação"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════╗
      ║                  Mise install — resumo final                     ║
      ╚══════════════════════════════════════════════════════════════════╝
      Fase 1 (cores):    {{ 'OK' if mise_phase1.rc | default(1) == 0 else 'FAIL' }}
      Fase 2 (backends): {{ 'OK' if mise_phase2.rc | default(1) == 0 else 'FAIL' }}
      Fase 3 (resto):    {{ 'OK' if mise_phase3.rc | default(1) == 0 else 'FAIL (com tolerância)' }}

      {% if (mise_missing.stdout | default('') | trim | length) > 0 %}
      ⚠  Tools que ainda NÃO instalaram (ação manual necessária):

      {{ mise_missing.stdout }}

      Pra reinstalar individual com diagnóstico:
        mise install <tool>@<version> -v

      Pra tentar todas as faltantes de uma vez:
        mise install
      {% else %}
      ✓  Todas as tools instaladas com sucesso.
      {% endif %}

      {% if mise_phase3.rc | default(0) != 0 %}
      ⚠  Fase 3 teve exit code não-zero mesmo após retries — logs:
        stdout: {{ (mise_phase3.stdout | default('') | truncate(500)) }}
        stderr: {{ (mise_phase3.stderr | default('') | truncate(500)) }}
      {% endif %}
  when: mise_binary_check.stat.exists

# ── Gcloud — install default components (pós mise install) ────────────────
# O .default-cloud-sdk-components dotfile era convenção do plugin asdf-
# gcloud legado. O plugin atual usado pelo mise registry direto (vfox-
# gcloud) NÃO suporta esse arquivo. Conferir:
#   https://github.com/mise-plugins/vfox-gcloud
#
# Em vez de mexer com gambiarra de plugin asdf, fazemos a instalação dos
# componentes via task Ansible explícita, rodando após o mise install
# completar. `mise exec gcloud --` garante que o gcloud da instalação do
# mise é usado (não algum gcloud do system PATH, se houver).
#
# Componentes instalados:
#   gke-gcloud-auth-plugin — auth provider pra clusters GKE (kubectl)
#   alpha                  — comandos alpha (cobertura experimental)
#   beta                   — comandos beta (cobertura pre-GA)
#
# Condições:
#   - mise_binary existe
#   - gcloud NÃO está em mise_missing (i.e., foi instalado com sucesso na
#     Fase 3 do mise install)
#   - failed_when: false — não bloqueia bootstrap se algo der errado
#     (network transient durante download de components)

- name: "Gcloud — verificar se gcloud foi instalado pelo mise"
  ansible.builtin.set_fact:
    gcloud_installed: >-
      {{ (mise_missing.stdout | default('')) is not search('^gcloud\s', multiline=True) }}
  when: mise_binary_check.stat.exists

- name: "Gcloud — install components default (gke-gcloud-auth-plugin, alpha, beta)"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} exec gcloud -- gcloud components install --quiet gke-gcloud-auth-plugin alpha beta"
  register: gcloud_components_result
  changed_when: "'Components installed' in (gcloud_components_result.stdout | default('')) or 'updated' in (gcloud_components_result.stdout | default('')).lower()"
  failed_when: false
  when:
    - mise_binary_check.stat.exists
    - gcloud_installed | default(false)

- name: "Gcloud — exibir status dos components"
  ansible.builtin.debug:
    msg: |
      {% if not (gcloud_installed | default(false)) %}
      ⚠  Gcloud não foi instalado pelo mise — skip de components install.
      {% elif (gcloud_components_result.rc | default(1)) == 0 %}
      ✓  Gcloud components instalados/atualizados: gke-gcloud-auth-plugin, alpha, beta
      {% else %}
      ⚠  Gcloud components install retornou exit code não-zero.
        stdout: {{ (gcloud_components_result.stdout | default('') | truncate(300)) }}
        stderr: {{ (gcloud_components_result.stderr | default('') | truncate(300)) }}

      Rodar manualmente:
        mise exec gcloud -- gcloud components install --quiet gke-gcloud-auth-plugin alpha beta
      {% endif %}
  when: mise_binary_check.stat.exists

# ── Java — macOS integration (symlink em /Library/Java/JavaVirtualMachines) ─
# Mise sugere apos `mise use -g java@lts`:
#
#   sudo mkdir /Library/Java/JavaVirtualMachines/<version>.jdk
#   sudo ln -s /Users/<user>/.local/share/mise/installs/java/<version>/Contents \
#              /Library/Java/JavaVirtualMachines/<version>.jdk/Contents
#
# Pra que serve: apps macOS que pesquisam JDKs em /Library/Java/JavaVirtualMachines/
# (IntelliJ, Android Studio, alguns instalers JVM via java_home) acharem
# o java instalado pelo mise sem precisar configurar JAVA_HOME manualmente.
#
# Como a versao do java eh "lts" no config.toml.tmpl (resolvida dinamicamente
# pelo mise), precisamos detectar a versao instalada em runtime e usar pra
# construir os paths.
#
# Idempotencia: stat do symlink antes de criar — se ja existe e aponta
# pro path correto, skip.

- name: "Java — detectar versão instalada via mise"
  ansible.builtin.command:
    cmd: "{{ mise_binary }} current java"
  register: mise_java_current
  changed_when: false
  failed_when: false
  when: mise_binary_check.stat.exists

- name: "Java — set facts com paths (versão dinâmica)"
  ansible.builtin.set_fact:
    java_version: "{{ mise_java_current.stdout | trim }}"
    java_mise_contents: "{{ ansible_user_dir }}/.local/share/mise/installs/java/{{ mise_java_current.stdout | trim }}/Contents"
    java_system_jvm_dir: "/Library/Java/JavaVirtualMachines/{{ mise_java_current.stdout | trim }}.jdk"
  when:
    - mise_binary_check.stat.exists
    - (mise_java_current.stdout | default('') | trim) | length > 0
    - "'No version' not in (mise_java_current.stdout | default(''))"

- name: "Java — verificar se symlink macOS já existe"
  ansible.builtin.stat:
    path: "{{ java_system_jvm_dir }}/Contents"
  register: java_symlink_check
  when:
    - mise_binary_check.stat.exists
    - java_system_jvm_dir is defined

- name: "Java — criar diretório /Library/Java/JavaVirtualMachines/<version>.jdk (sudo)"
  ansible.builtin.file:
    path: "{{ java_system_jvm_dir }}"
    state: directory
    mode: '0755'
  become: true
  when:
    - mise_binary_check.stat.exists
    - java_system_jvm_dir is defined
    - not (java_symlink_check.stat.exists | default(false))

- name: "Java — criar symlink Contents -> mise install (sudo)"
  ansible.builtin.file:
    src: "{{ java_mise_contents }}"
    dest: "{{ java_system_jvm_dir }}/Contents"
    state: link
    force: false
  become: true
  when:
    - mise_binary_check.stat.exists
    - java_system_jvm_dir is defined
    - not (java_symlink_check.stat.exists | default(false))

- name: "Java — exibir status integração macOS"
  ansible.builtin.debug:
    msg: |
      {% if java_version is not defined %}
      ⚠  Java não detectado via 'mise current java' — skip integração macOS.
      {% elif (java_symlink_check.stat.exists | default(false)) %}
      ✓  Java integração macOS já configurada:
        {{ java_system_jvm_dir }}/Contents → {{ java_mise_contents }}
      {% else %}
      ✓  Java integração macOS criada (versão {{ java_version }}):
        {{ java_system_jvm_dir }}/Contents → {{ java_mise_contents }}
      Apps macOS (IntelliJ, Android Studio, /usr/libexec/java_home) agora
      enxergam esse JDK.
      {% endif %}
  when: mise_binary_check.stat.exists


# ── Caveman — coding agent output compression skill ────────────────────────
# Caveman é uma skill/plugin que reduz tokens em respostas dos coding
# agents instalados. Cobertura cross-agent: claude-code, cursor-cli,
# gemini-cli (todos no Brewfile), e ainda Codex/Windsurf/Cline/Copilot/etc.
# se vierem a ser instalados no futuro.
#
# INSTALL METHOD: universal installer oficial (curl|bash) — auto-detecta
# agents instalados e configura skill/plugin pra cada. Agents ausentes
# são pulados silenciosamente. Mesma filosofia da task Java macOS
# integration acima — automatizar passo pós-install dentro do playbook.
#
# PRE-REQS:
#   - Node ≥18 (vem do mise — Fase 1: node = "lts")
#   - Pelo menos 1 coding agent (verificamos /opt/homebrew/bin/claude
#     como proxy — está no Brewfile)
#
# IDEMPOTÊNCIA: installer eh declarado 'safe to re-run' (doc oficial).
# Rodamos sempre — overhead é baixo (~5s, ~few MB rede) e garante
# updates da skill quando lançam novas versões.
#
# CONFIG: não setamos CAVEMAN_DEFAULT_MODE aqui. Default do caveman
# (mode 'full') fica ativo. Configuração de mode/customizações fica
# pra fatia futura (via env var no config.fish OU
# ~/.config/caveman/config.json).

- name: "Caveman — verificar pré-req (pelo menos 1 coding agent instalado)"
  ansible.builtin.stat:
    path: /opt/homebrew/bin/claude
  register: claude_binary_check

- name: "Caveman — install/update via universal installer"
  ansible.builtin.shell:
    # Flags pra unattended:
    #   --never-prompt: flag OFICIAL documentada em INSTALL.md do caveman.
    #     "Auto when stdin is not a TTY" não funciona em prática dentro do
    #     Ansible porque install.sh internamente faz `exec npx -y github:...`,
    #     que re-spawna processo e perde o stdin context. Flag explícita
    #     resolve. (Tentativa anterior com `--non-interactive` falhou — não
    #     é flag válida do caveman, foi ignorada silenciosamente.)
    #   --all: ativa hooks + init + mcp-shrink (full feature set). Sem isso,
    #     installer entra em multi-select TUI pra escolher features.
    #   --no-color: desabilita ANSI escapes — output mais limpo no ansible log
    #     e evita issues em ambientes que não suportam TTY colors.
    # < /dev/null: defensivo — força stdin closed mesmo se algo no pipeline
    # tenta ler input.
    cmd: "curl -fsSL https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.sh | bash -s -- --never-prompt --all --no-color < /dev/null"
  environment:
    # PATH inclui mise shims (pra Node), brew bins (pra claude/agent/gemini)
    # e ansible_env.PATH (fallback). Sem isso, installer pode falhar em
    # detectar agents.
    PATH: "{{ ansible_user_dir }}/.local/share/mise/shims:/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_env.PATH }}"
  register: caveman_install
  # Timeout em 300s (5min). Installer faz vários downloads (skills, plugins,
  # extensions). Se passar de 5min, algo tá errado — não trava bootstrap.
  timeout: 300
  # changed_when: false porque installer eh idempotente e sempre escreve
  # algo no stdout (output verbose). Marcar como always-changed gera
  # ruído desnecessário a cada run.
  changed_when: false
  failed_when: false   # tolerante — bootstrap não derrubado por falha aqui
  when: claude_binary_check.stat.exists

- name: "Caveman — exibir status"
  ansible.builtin.debug:
    msg: |
      {% if not claude_binary_check.stat.exists %}
      ⚠  Nenhum coding agent detectado (esperava /opt/homebrew/bin/claude).
         Skip install do caveman — agents do Brewfile podem ter falhado.
      {% elif (caveman_install.rc | default(1)) == 0 %}
      ✓  Caveman install/update concluído.
         Output (last 5 lines):
         {{ caveman_install.stdout_lines[-5:] | default(['(sem output)']) | join('\n         ') }}
      {% else %}
      ⚠  Caveman install falhou (rc={{ caveman_install.rc | default('?') }}).
         stderr: {{ caveman_install.stderr | default('(sem stderr)') | truncate(200) }}
         Pra re-tentar manual:
           curl -fsSL https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.sh | bash
      {% endif %}
