---
# ────────────────────────────────────────────────────────────────────────────
# roles/chezmoi/tasks/main.yml
# ────────────────────────────────────────────────────────────────────────────
# Ordem das fases:
#   1. Pré-check do chezmoi binary (vem do Brewfile)
#   2. Chezmoi init (clone do source pra ~/.local/share/chezmoi/) — primeira vez
#   3. Chezmoi update (pull source + apply) — sempre
#   4. Mise trust (autoriza o config materializado pelo apply)
#   5. Mise install (instala tools declarados em ~/.config/mise/config.toml)
#
# Notas arquiteturais:
#   - Apesar do bootstrap.sh já clonar o repo em ~/.local/share/dotfiles/,
#     o chezmoi tem source dir próprio (~/.local/share/chezmoi/). Duplicação
#     de espaço (~poucos MB) mas zero acoplamento.
#   - Usamos `chezmoi update` (NÃO `chezmoi apply`) na fase 3 porque update
#     faz `git pull` no source dir ANTES de aplicar. Sem o pull, mudanças
#     commitadas no repo nunca chegariam ao chezmoi — o source do chezmoi
#     ficaria preso na versão da primeira execução (`chezmoi init`).
#   - Mise trust + install rodam aqui (não em hook chezmoi run_onchange)
#     pra ter visibilidade no PLAY RECAP e stderr completo em caso de falha.
# ────────────────────────────────────────────────────────────────────────────


# ── 1. Pré-check ──────────────────────────────────────────────────────────

- name: "Chezmoi — verificar binary instalado"
  ansible.builtin.stat:
    path: "{{ chezmoi_binary }}"
  register: chezmoi_binary_check

- name: "Chezmoi — abortar se binary não encontrado"
  ansible.builtin.fail:
    msg: |
      {{ chezmoi_binary }} não encontrado. A role homebrew deveria ter
      instalado via Brewfile. Re-roda o playbook a partir do início.
  when: not chezmoi_binary_check.stat.exists


# ── 2. Chezmoi init ───────────────────────────────────────────────────────
# Clone source no primeiro run. Idempotente via stat check.

- name: "Chezmoi — verificar se source já foi inicializado"
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/share/chezmoi/.git"
  register: chezmoi_source_check

- name: "Chezmoi — init (clone source na primeira vez)"
  ansible.builtin.command: "{{ chezmoi_binary }} init {{ chezmoi_repo }}"
  when: not chezmoi_source_check.stat.exists
  changed_when: true


# ── 3. Chezmoi update ─────────────────────────────────────────────────────
# `chezmoi update` faz `git pull` no source dir (~/.local/share/chezmoi/)
# e depois aplica. Resolve o problema de source desatualizado: bootstrap.sh
# atualiza ~/.local/share/dotfiles/ mas chezmoi tem source próprio. Sem
# update, mudanças commitadas no repo só aparecem no chezmoi após manual
# git pull no source dir dele.
#
# --verbose: imprime cada arquivo que mudou. stdout vazio = nada mudou.
# Idempotente.

- name: "Chezmoi — update (pull source + materializar dotfiles em $HOME)"
  ansible.builtin.command: "{{ chezmoi_binary }} update --verbose"
  register: chezmoi_update_result
  changed_when: chezmoi_update_result.stdout | length > 0

- name: "Chezmoi — exibir output do update (apenas se houve mudanças)"
  ansible.builtin.debug:
    msg: "{{ chezmoi_update_result.stdout_lines }}"
  when: chezmoi_update_result.stdout_lines | length > 0


# ── 4. Mise trust ─────────────────────────────────────────────────────────
# mise pede confirmação interativa em config novo (proteção contra config
# malicioso em projetos random). Em automation isso quebra (sem TTY).
# `mise trust` whitelista o path; persiste em ~/.local/state/mise/.

- name: "Mise — verificar binary instalado"
  ansible.builtin.stat:
    path: "{{ mise_binary }}"
  register: mise_binary_check

- name: "Mise — trust user config materializado pelo chezmoi"
  ansible.builtin.command: "{{ mise_binary }} trust {{ ansible_env.HOME }}/.config/mise/config.toml"
  changed_when: false
  when: mise_binary_check.stat.exists


# ── 5. Mise install ───────────────────────────────────────────────────────
# Instala tools declaradas em ~/.config/mise/config.toml. Idempotente —
# mise pula tools já instaladas na versão certa. Pode demorar na primeira
# run (compila Python, baixa Node, Go).
#
# GITHUB_TOKEN: propagamos a env var do shell que invocou bootstrap.sh
# (se setada) pra que mise autentique contra GitHub API durante downloads.
# Sem token: rate limit anônimo de 60 req/h por IP — quebra install de
# ~90 tools no meio. Com token: 5000+ req/h.
#
# Mise resolution order (ver dot_config/mise/config.toml.tmpl):
#   1. MISE_GITHUB_TOKEN env (não usamos — reservado pra override forçado)
#   2. GITHUB_API_TOKEN env (não setamos aqui)
#   3. GITHUB_TOKEN env (ESTA fase, propagada do shell pai)
#   4. credential_command (op item get) — fallback pra runs sem env var
#
# Cold start (primeira execução, sem 1P signed in):
#   export GITHUB_TOKEN=ghp_xxx antes de rodar bootstrap.sh
#   mise pega via env, ignora credential_command (que falharia mesmo)
#
# Runs subsequentes (1P signed in, sem GITHUB_TOKEN env):
#   GITHUB_TOKEN não setado → mise cai pro credential_command → op puxa
#   token do 1P sem prompt (Touch ID OK no contexto autenticado)
#
# Se ambos falharem: mise tenta unauthenticated → 403 em vários tools.

- name: "Mise — instalar tools declarados"
  ansible.builtin.command: "{{ mise_binary }} install"
  environment:
    GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN', default='') }}"
  register: mise_install_result
  changed_when: mise_install_result.stdout != "" or mise_install_result.stderr != ""
  when: mise_binary_check.stat.exists

- name: "Mise — exibir status do token usado"
  ansible.builtin.debug:
    msg: |
      GITHUB_TOKEN no env do shell: {{ 'sim (propagado pra mise via env)' if lookup('env', 'GITHUB_TOKEN', default='') else 'não — mise tentará credential_command (op)' }}
  when: mise_binary_check.stat.exists

- name: "Mise — exibir output do install"
  ansible.builtin.debug:
    msg: |
      {{ 'Output:' if (mise_install_result.stdout or mise_install_result.stderr) else 'Tudo já em sync — nenhum tool novo.' }}
      stdout: {{ mise_install_result.stdout | default('(vazio)') }}
      stderr: {{ mise_install_result.stderr | default('(vazio)') }}
  when: mise_binary_check.stat.exists
