---
# =============================================================================
# ansible/roles/macos-defaults/tasks/main.yml
# Configurações pós-instalação de apps no macOS.
# =============================================================================
#
# Roda DEPOIS do homebrew (depende de apps instalados via cask).
# Cobre as configurações que SÃO automatizáveis sem MDM:
#   1. Remove quarantine attribute de apps (suprime "downloaded from internet")
#   2. Default browser → Chrome (idempotente; ACIONA PROMPT GUI obrigatório
#      desde Big Sur — automation parcial, mas força o user a confirmar)
#   3. Set Keka como uncompressor default pra formatos comuns
#
# O que NÃO cobre (impossível sem MDM):
#   - Keybase Finder integration: setup moderno (6.6.2+) usa SMJobBless +
#     FUSE for macOS (kext) + reboot. Requer admin password + kext
#     approval no System Settings.
#   - TCC permissions (Accessibility, FDA, Screen Recording, Input Monitoring,
#     Bluetooth, Local Network, Network Extensions, Apple Events, etc.)
#   - Notifications "Allow" pre-approval
#   - Safari extensions enable
# Essas ficam pro MacZeroToHero runbook.
#
# Dependencies (instaladas via Brewfile):
#   - defaultbrowser (CLI Swift — aciona prompt nativo do macOS)
#   - duti (CLI pra LSHandlers — funciona pra content type UTI E pra
#     check do http URL scheme handler)

# ─── 1. Remove quarantine attribute (Gatekeeper "downloaded from internet") ──
# Apps baixados via brew cask carregam o xattr com.apple.quarantine. macOS então
# mostra "Are you sure you want to open?" no 1º uso. Removendo o xattr suprime
# esse prompt sem deshabilitar Gatekeeper globalmente.
#
# Aplicado APENAS em apps que sabidamente trigaram o prompt no setup do user
# (qBittorrent, Cursor). xattr -dr é recursivo e idempotente — se o attr não
# existe, retorna 0 silenciosamente.

- name: "macos-defaults — remover quarantine de apps específicos"
  ansible.builtin.command:
    cmd: xattr -dr com.apple.quarantine "/Applications/{{ item }}"
  loop:
    - "qBittorrent.app"
    - "Cursor.app"
    # Adicionar outros aqui se aparecer Gatekeeper prompt em mais apps
  failed_when: false           # apps podem não estar instalados — não falha
  changed_when: false          # idempotente, não tem como detectar diff confiável
  tags:
    - quarantine

# Versão "all-apps" — descomenta se quiser limpar TUDO em /Applications.
# Mais agressivo, mas funciona pra setup novo onde nada deveria ter trust issues.
#
# - name: "macos-defaults — remover quarantine de TODOS os apps em /Applications"
#   ansible.builtin.shell: |
#     find /Applications -maxdepth 2 -name "*.app" -print0 | \
#       xargs -0 -n1 xattr -dr com.apple.quarantine 2>/dev/null || true
#   changed_when: false


# ─── 2. Default browser → Chrome (idempotente, mas prompt GUI obrigatório) ──
# macOS Big Sur+ bloqueia mudança silenciosa do default browser. A task abaixo
# detecta o handler atual do scheme 'http' via duti. Se já é Chrome, skip.
# Se não, dispara `defaultbrowser chrome` que ACIONA UM PROMPT MODAL GUI:
#   "Do you want to change your default web browser to Chrome?"
# Sem clicar "Use Chrome", o set não toma efeito (mesmo com rc=0 da CLI).
#
# Decisão consciente: manter a task mesmo sabendo da limitação. Acionar o
# prompt é melhor que esquecer — força o user a tomar a decisão consciente
# durante o bootstrap em vez de descobrir Safari como default depois.

- name: "macos-defaults — detectar handler atual do scheme http (= default browser)"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/duti -x http
  register: http_handler_check
  changed_when: false
  failed_when: false           # http sem handler retorna rc != 0; tratado como "needs set"
  tags:
    - browser

- name: "macos-defaults — disparar prompt pra setar Chrome (se ainda não for default)"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/defaultbrowser chrome
  when: "'com.google.Chrome' not in (http_handler_check.stdout | default(''))"
  register: defaultbrowser_result
  changed_when: defaultbrowser_result.rc == 0
  failed_when: false
  tags:
    - browser


# ─── 3. Keka como uncompressor default (zip, rar, 7z, tar, gz, bz2) ─────────
# duti seta LSHandlers (Launch Services). Formato:
#   duti -s <bundle_id> <UTI> all
#
# UTI = Uniform Type Identifier (público do Apple).
# Bundle ID Keka: com.aone.keka
#
# Idempotência: `duti -x <UTI>` mostra handler atual (app, bundle ID, path).
# Se output contém 'com.aone.keka' → já é Keka, skip. Caso contrário, set.

- name: "macos-defaults — verificar handler atual de cada UTI"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/duti -x {{ item }}
  loop:
    - public.zip-archive
    - com.rarlab.rar-archive
    - org.7-zip.7-zip-archive
    - public.tar-archive
    - org.gnu.gnu-zip-archive
    - org.gnu.gnu-zip-tar-archive
    - public.bzip2-archive
    - public.xz-archive
  register: keka_uti_check
  changed_when: false
  failed_when: false           # UTI sem handler retorna rc!=0; tratado como "needs set"
  tags:
    - associations

- name: "macos-defaults — set Keka como handler (só UTIs que ainda não são)"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/duti -s com.aone.keka {{ item.item }} all
  loop: "{{ keka_uti_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: "'com.aone.keka' not in (item.stdout | default(''))"
  register: keka_set_result
  changed_when: keka_set_result.rc == 0
  failed_when: false           # Keka pode não estar instalado em alguns hosts
  tags:
    - associations


  tags:
    - associations


# ─── Keybase helper — REMOVIDO ──────────────────────────────────────────────
# Keybase 6.6.2+ usa SMJobBless API + FUSE for macOS (kernel extension closed-
# source) pra Finder integration. Setup moderno requer:
#   1. Click "Enable Finder integration" no app GUI
#   2. Password de admin no prompt nativo (SMJobBless)
#   3. Aprovação manual da kernel extension no System Settings
#   4. Reboot pra rebuild do extension index
# Nada disso é automatizável sem MDM com kext approval profile.
# Vai pro MacZeroToHero runbook como passo manual.


# ─── 4. Resumo ──────────────────────────────────────────────────────────────

- name: "macos-defaults — exibir resumo"
  ansible.builtin.debug:
    msg: |
      ── macos-defaults aplicado ──
      • Quarantine removido (qBittorrent, Cursor)
      • Default browser: {{
            'já é Chrome (skip)' if 'com.google.Chrome' in (http_handler_check.stdout | default(''))
            else 'PROMPT GUI ACIONADO — confirme manualmente no macOS pra completar'
        }}
      • Keka uncompressor: {{
            (keka_set_result.results | default([]) | rejectattr('skipped', 'defined') | list | length)
        }} UTIs setados nesta execução (de 8 totais)

      Keybase Finder integration, configs TCC (Accessibility, FDA, etc.),
      Safari extensions e notifications "Allow" seguem MANUAIS — ver
      MacZeroToHero runbook.
