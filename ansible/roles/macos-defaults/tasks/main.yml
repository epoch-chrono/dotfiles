---
# =============================================================================
# ansible/roles/macos-defaults/tasks/main.yml
# Configurações pós-instalação de apps no macOS.
# =============================================================================
#
# Roda DEPOIS do homebrew (depende de apps instalados via cask).
# Cobre as configurações que SÃO automatizáveis sem MDM:
#   1. Remove quarantine attribute de apps (suprime "downloaded from internet")
#   2. Set Keka como uncompressor default pra formatos comuns
#   3. Instala Keybase helper (se Keybase instalado e helper presente)
#
# O que NÃO cobre (impossível sem MDM ou interação humana):
#   - Default browser: API LSSetDefaultHandlerForURLScheme gera prompt
#     modal GUI desde macOS Big Sur (2020). Mover pro MacZeroToHero
#     runbook (manual).
#   - TCC permissions (Accessibility, FDA, Screen Recording, Input Monitoring,
#     Bluetooth, Local Network, Network Extensions, Apple Events, etc.)
#   - Notifications "Allow" pre-approval
#   - Safari extensions enable
# Essas ficam pro MacZeroToHero runbook.
#
# Dependencies (instaladas via Brewfile):
#   - duti (CLI pra LSHandlers — funciona pra content type, NÃO pra
#     URL scheme handlers como http/https)

# ─── 1. Remove quarantine attribute (Gatekeeper "downloaded from internet") ──
# Apps baixados via brew cask carregam o xattr com.apple.quarantine. macOS então
# mostra "Are you sure you want to open?" no 1º uso. Removendo o xattr suprime
# esse prompt sem deshabilitar Gatekeeper globalmente.
#
# Aplicado APENAS em apps que sabidamente trigaram o prompt no setup do user
# (qBittorrent, Cursor). xattr -dr é recursivo e idempotente — se o attr não
# existe, retorna 0 silenciosamente.

- name: "macos-defaults — remover quarantine de apps específicos"
  ansible.builtin.command:
    cmd: xattr -dr com.apple.quarantine "/Applications/{{ item }}"
  loop:
    - "qBittorrent.app"
    - "Cursor.app"
    # Adicionar outros aqui se aparecer Gatekeeper prompt em mais apps
  failed_when: false           # apps podem não estar instalados — não falha
  changed_when: false          # idempotente, não tem como detectar diff confiável
  tags:
    - quarantine

# Versão "all-apps" — descomenta se quiser limpar TUDO em /Applications.
# Mais agressivo, mas funciona pra setup novo onde nada deveria ter trust issues.
#
# - name: "macos-defaults — remover quarantine de TODOS os apps em /Applications"
#   ansible.builtin.shell: |
#     find /Applications -maxdepth 2 -name "*.app" -print0 | \
#       xargs -0 -n1 xattr -dr com.apple.quarantine 2>/dev/null || true
#   changed_when: false


# ─── 2. Keka como uncompressor default (zip, rar, 7z, tar, gz, bz2) ─────────
# duti seta LSHandlers (Launch Services). Formato:
#   duti -s <bundle_id> <UTI> all
#
# UTI = Uniform Type Identifier (público do Apple).
# Bundle ID Keka: com.aone.keka
#
# Idempotência: `duti -x <UTI>` mostra handler atual (app, bundle ID, path).
# Se output contém 'com.aone.keka' → já é Keka, skip. Caso contrário, set.

- name: "macos-defaults — verificar handler atual de cada UTI"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/duti -x {{ item }}
  loop:
    - public.zip-archive
    - com.rarlab.rar-archive
    - org.7-zip.7-zip-archive
    - public.tar-archive
    - org.gnu.gnu-zip-archive
    - org.gnu.gnu-zip-tar-archive
    - public.bzip2-archive
    - public.xz-archive
  register: keka_uti_check
  changed_when: false
  failed_when: false           # UTI sem handler retorna rc!=0; tratado como "needs set"
  tags:
    - associations

- name: "macos-defaults — set Keka como handler (só UTIs que ainda não são)"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/duti -s com.aone.keka {{ item.item }} all
  loop: "{{ keka_uti_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: "'com.aone.keka' not in (item.stdout | default(''))"
  register: keka_set_result
  changed_when: keka_set_result.rc == 0
  failed_when: false           # Keka pode não estar instalado em alguns hosts
  tags:
    - associations


# ─── 3. Keybase helper (Finder integration + redirector) ────────────────────
# Keybase precisa do redirector-install (helper KBFS Finder integration) ser
# executado fora do app bundle pra integração funcionar. Path do helper dentro
# do bundle pode variar entre versões — usamos uma sonda de paths conhecidos.

- name: "macos-defaults — verificar se Keybase.app está instalado"
  ansible.builtin.stat:
    path: /Applications/Keybase.app
  register: keybase_app_check
  tags:
    - keybase

- name: "macos-defaults — detectar path do redirector-install"
  ansible.builtin.shell: |
    for candidate in \
      /Applications/Keybase.app/Contents/Resources/redirector-install \
      /Applications/Keybase.app/Contents/SharedSupport/bin/redirector-install \
      /Applications/Keybase.app/Contents/SharedSupport/redirector-install \
      /Applications/Keybase.app/Contents/MacOS/redirector-install
    do
      [ -x "$candidate" ] && { echo "$candidate"; exit 0; }
    done
    # Fallback: find dentro do bundle (mais caro, só se sondas falharem)
    find /Applications/Keybase.app -name 'redirector-install' -type f -perm +111 2>/dev/null | head -1
  args:
    executable: /bin/bash
  register: keybase_helper_path
  changed_when: false
  failed_when: false
  when: keybase_app_check.stat.exists
  tags:
    - keybase

- name: "macos-defaults — instalar Keybase redirector (precisa sudo)"
  ansible.builtin.command:
    cmd: "{{ keybase_helper_path.stdout | trim }}"
  become: true
  when:
    - keybase_app_check.stat.exists
    - (keybase_helper_path.stdout | default('') | trim) != ''
  register: keybase_helper_result
  changed_when: "'already installed' not in (keybase_helper_result.stdout | default(''))"
  failed_when: false
  tags:
    - keybase


# ─── 5. Resumo ──────────────────────────────────────────────────────────────

- name: "macos-defaults — exibir resumo"
  ansible.builtin.debug:
    msg: |
      ── macos-defaults aplicado ──
      • Quarantine removido (qBittorrent, Cursor)
      • Keka uncompressor: {{
            (keka_set_result.results | default([]) | rejectattr('skipped', 'defined') | list | length)
        }} UTIs setados nesta execução (de 8 totais)
      • Keybase helper: {{
            'instalado em ' + (keybase_helper_path.stdout | trim)
            if keybase_app_check.stat.exists and (keybase_helper_path.stdout | default('') | trim) != ''
            else
            ('app instalado mas redirector-install não encontrado no bundle (versão sem helper?)'
             if keybase_app_check.stat.exists
             else 'app não encontrado, skip')
        }}

      Default browser e configs TCC (Accessibility, FDA, etc.) seguem
      MANUAIS — ver MacZeroToHero runbook.
