---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/finder.yml — defaults do Finder
# ────────────────────────────────────────────────────────────────────────────

- name: "Finder — defaults"
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ finder_defaults }}"
  loop_control:
    label: "{{ item.domain }} / {{ item.key }} = {{ item.value }}"
  notify:
    - restart Finder
