---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/keyboard.yml — defaults de teclado
# ────────────────────────────────────────────────────────────────────────────
# KeyRepeat e InitialKeyRepeat costumam exigir logout/login para refletir
# totalmente em alguns apps (mesmo com handlers killall). Full Keyboard
# Access (AppleKeyboardUIMode) também tende a precisar logout/login.
# ────────────────────────────────────────────────────────────────────────────

- name: "Keyboard — defaults"
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ keyboard_defaults }}"
  loop_control:
    label: "{{ item.domain }} / {{ item.key }} = {{ item.value }}"
  notify:
    - reload cfprefsd
    - restart Finder
    - restart Dock
    - restart SystemUIServer
