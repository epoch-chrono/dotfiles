---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/firewall.yml — Application Firewall (socketfilterfw)
# ────────────────────────────────────────────────────────────────────────────
# Cobre o painel "Network > Firewall" do System Settings via socketfilterfw.
#
# A partir do macOS Sequoia, configurações do Application Firewall NÃO ficam
# mais em /Library/Preferences/com.apple.alf.plist — elas são gerenciadas
# exclusivamente via socketfilterfw ou MDM. Edição direta de plist é
# deprecated. Referência: hardening guide oficial macOS Tahoe (ernw).
#
# Configurações aplicadas:
#   - Global state: ON (firewall ligado)
#   - Stealth mode: ON (não responde a ICMP echo / probes em portas fechadas)
#   - Logging mode: ON, com opt = detail (logs em /var/log/appfirewall.log)
#   - Block all: OFF (CRÍTICO — manter OFF, ver nota abaixo)
#   - Allow signed (built-in Apple apps): ON
#   - Allow signedapp (downloaded signed apps, ex: homebrew): ON
#
# NOTA SOBRE 'block all':
#   Block all incoming sobrescreve TODAS as exceções por app. Se ON, quebra
#   SSH / Screen Sharing / SMB que foram habilitados na role 'sharing'. Pra
#   bloqueio agressivo + SSH ainda acessível, usar pf (não cobrimos aqui).
#
# Estratégia (corrigida em v0.9.1):
#   A primeira tentativa fazia check+set por flag em loop dentro do mesmo
#   shell, com 'set -e'. Em macOS Tahoe, o socketfilterfw daemon reinicia
#   ao mudar uma flag (ex: stealthmode), e a próxima chamada (--getX) pode
#   retornar rc 255 antes do daemon ficar pronto. Resultado: script morria
#   no meio com exit 255.
#
#   Solução: aplicar TODAS as flags numa única invocação do socketfilterfw
#   (sintaxe documentada e usada por Kolide/hardening guides). O daemon
#   processa tudo e reinicia uma única vez no fim. Idempotência via
#   comparação do estado antes/depois — se output igual, não mudou.
#
# Sem dependência do community.general (osx_defaults não funciona aqui —
# socketfilterfw é binário separado, não plist).
# ────────────────────────────────────────────────────────────────────────────

- name: "Firewall — verificar se há MDM profile gerenciando settings"
  ansible.builtin.shell:
    cmd: |
      /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate 2>&1 \
        | grep -qi "Firewall settings cannot be modified from command line"
  register: firewall_managed_check
  failed_when: false
  changed_when: false
  become: true

- name: "Firewall — abortar se gerenciado por MDM"
  ansible.builtin.fail:
    msg: |
      Application Firewall está sendo gerenciado por um MDM profile.
      socketfilterfw não consegue modificar via CLI nesse caso.
      Configure via MDM (PayloadType com.apple.security.firewall) ou remova
      o profile antes de rodar este playbook.
  when: firewall_managed_check.rc == 0

# ── Capturar estado antes ──────────────────────────────────────────────────
# Output normalizado para comparação posterior. 2>&1 captura warnings
# que socketfilterfw às vezes manda pra stderr.

- name: "Firewall — capturar estado atual (antes)"
  ansible.builtin.shell:
    cmd: |
      /usr/libexec/ApplicationFirewall/socketfilterfw \
        --getglobalstate \
        --getstealthmode \
        --getloggingmode \
        --getloggingopt \
        --getblockall \
        --getallowsigned 2>&1
  register: firewall_before
  changed_when: false
  failed_when: false
  become: true

# ── Aplicar tudo numa única invocação ──────────────────────────────────────
# Sintaxe documentada por Apple e usada em hardening scripts oficiais.
# Em uma única call, o daemon processa todas as flags e reinicia 1 vez no
# fim — evita o problema de exit 255 entre chamadas sequenciais.
# failed_when: false porque socketfilterfw em macOS Tahoe às vezes retorna
# rc não-zero mesmo com sucesso. Validação real é via diff antes/depois.

- name: "Firewall — aplicar todas as configurações (one-shot)"
  ansible.builtin.command:
    argv:
      - /usr/libexec/ApplicationFirewall/socketfilterfw
      - --setglobalstate
      - "on"
      - --setstealthmode
      - "on"
      - --setloggingmode
      - "on"
      - --setloggingopt
      - detail
      - --setblockall
      - "off"
      - --setallowsigned
      - "on"
      - --setallowsignedapp
      - "on"
  register: firewall_apply
  changed_when: false  # mudança real é detectada pela próxima task
  failed_when: false
  become: true

# ── Capturar estado depois e comparar ──────────────────────────────────────

- name: "Firewall — capturar estado atual (depois) e detectar mudança"
  ansible.builtin.shell:
    cmd: |
      /usr/libexec/ApplicationFirewall/socketfilterfw \
        --getglobalstate \
        --getstealthmode \
        --getloggingmode \
        --getloggingopt \
        --getblockall \
        --getallowsigned 2>&1
  register: firewall_after
  changed_when: firewall_after.stdout != firewall_before.stdout
  failed_when: false
  become: true

- name: "Firewall — exibir resumo do estado final"
  ansible.builtin.debug:
    msg:
      - "{{ firewall_after.stdout_lines }}"
      - "---"
      - "Mudou nesta execução: {{ firewall_after.stdout != firewall_before.stdout }}"
