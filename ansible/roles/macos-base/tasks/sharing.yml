---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/sharing.yml — Hostname + Sharing daemons
# ────────────────────────────────────────────────────────────────────────────
# Cobre o painel "General > Sharing" do System Settings:
#   - Hostname: ComputerName, HostName, LocalHostName via scutil
#   - Remote Login (SSH): systemsetup -setremotelogin
#   - Screen Sharing: bootstrap/load -w + enable + kickstart com.apple.screensharing
#   - File Sharing (SMB): bootstrap/load -w + enable + kickstart com.apple.smbd
#
# Todas as tasks abaixo são task-based (sem array em defaults) porque cada
# uma tem semântica própria — não dá pra unificar em loop osx_defaults.
#
# Idempotência: cada task tem um check prévio que registra estado atual.
# A action só roda quando a condição não bate. Em re-runs, todas viram
# 'skipping' (sem changed, sem ruído).
#
# Variável obrigatória: target_hostname (passada via --extra-vars pelo
# bootstrap.sh; o bootstrap aborta se TARGET_HOSTNAME não estiver setado).
# ────────────────────────────────────────────────────────────────────────────

- name: "Sharing — validar que target_hostname está definida"
  ansible.builtin.assert:
    that:
      - target_hostname is defined
      - target_hostname | length > 0
      - target_hostname | length <= 63
      - target_hostname is match('^[a-zA-Z0-9-]+$')
    fail_msg: >-
      target_hostname inválida (precisa ser ASCII alphanumeric + hifen,
      1-63 chars). Valor atual: "{{ target_hostname | default('UNDEFINED') }}"
    success_msg: "target_hostname válida: {{ target_hostname }}"

# ── Hostname (3 chaves) ────────────────────────────────────────────────────

- name: "Hostname — ler ComputerName atual"
  ansible.builtin.command:
    cmd: scutil --get ComputerName
  register: computer_name_current
  failed_when: false
  changed_when: false

- name: "Hostname — setar ComputerName"
  ansible.builtin.command:
    cmd: scutil --set ComputerName "{{ target_hostname }}"
  when: (computer_name_current.stdout | trim) != target_hostname
  become: true

- name: "Hostname — ler HostName atual"
  ansible.builtin.command:
    cmd: scutil --get HostName
  register: host_name_current
  failed_when: false
  changed_when: false

- name: "Hostname — setar HostName"
  ansible.builtin.command:
    cmd: scutil --set HostName "{{ target_hostname }}"
  when: (host_name_current.stdout | trim) != target_hostname
  become: true

- name: "Hostname — ler LocalHostName atual"
  ansible.builtin.command:
    cmd: scutil --get LocalHostName
  register: local_host_name_current
  failed_when: false
  changed_when: false

- name: "Hostname — setar LocalHostName"
  ansible.builtin.command:
    cmd: scutil --set LocalHostName "{{ target_hostname }}"
  when: (local_host_name_current.stdout | trim) != target_hostname
  become: true

# ── Remote Login (SSH) ─────────────────────────────────────────────────────

- name: "Remote Login (SSH) — verificar status atual"
  ansible.builtin.command:
    cmd: systemsetup -getremotelogin
  register: remote_login_status
  failed_when: false
  changed_when: false
  become: true

- name: "Remote Login (SSH) — habilitar"
  ansible.builtin.command:
    cmd: systemsetup -setremotelogin on
  when: '"Remote Login: On" not in remote_login_status.stdout'
  become: true

# ── Screen Sharing ─────────────────────────────────────────────────────────
# Sequência robusta para macOS Tahoe/Sequoia:
#   1. bootstrap (moderno) — registra o plist no system domain
#   2. fallback: load -w (legacy) — usado se bootstrap falhar (SIP/SSV)
#   3. enable + kickstart -k — garante enabled e rodando
# Best-effort: se ao final o serviço não estiver running, avisa mas não
# quebra o playbook. Automação de Sharing daemons em macOS recente é
# frágil por causa do System Volume read-only e restrições de SIP.

- name: "Screen Sharing — verificar status atual"
  ansible.builtin.shell:
    cmd: launchctl print system/com.apple.screensharing 2>&1 | grep -E "^\s+state\s*=" | head -1
  register: screensharing_status
  failed_when: false
  changed_when: false
  become: true

- name: "Screen Sharing — habilitar e iniciar (best-effort)"
  ansible.builtin.shell:
    cmd: |
      set +e
      # 1. Tenta bootstrap (sintaxe moderna)
      launchctl bootstrap system /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null
      # 2. Fallback legacy se ainda nao registrou
      launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null
      # 3. Garante enabled e rodando
      launchctl enable system/com.apple.screensharing 2>/dev/null
      launchctl kickstart -k system/com.apple.screensharing 2>/dev/null
      # Tolerar erros — re-validamos com state na proxima task
      exit 0
  when: screensharing_status.stdout is not search('state\s*=\s*running')
  become: true
  register: screensharing_enable

- name: "Screen Sharing — re-validar estado após tentativa"
  ansible.builtin.shell:
    cmd: launchctl print system/com.apple.screensharing 2>&1 | grep -E "^\s+state\s*=" | head -1
  register: screensharing_status_after
  failed_when: false
  changed_when: false
  become: true
  when: screensharing_status.stdout is not search('state\s*=\s*running')

- name: "Screen Sharing — aviso se não habilitou"
  ansible.builtin.debug:
    msg:
      - "AVISO: Screen Sharing não foi habilitado automaticamente."
      - "Estado final: {{ screensharing_status_after.stdout | default('NOT_FOUND') | trim }}"
      - "Habilite manualmente: System Settings > General > Sharing > Screen Sharing"
  when:
    - screensharing_status.stdout is not search('state\s*=\s*running')
    - screensharing_status_after.stdout is defined
    - screensharing_status_after.stdout is not search('state\s*=\s*running')

# ── File Sharing (SMB) ─────────────────────────────────────────────────────
# Mesma estrutura best-effort do Screen Sharing.

- name: "File Sharing (SMB) — verificar status atual"
  ansible.builtin.shell:
    cmd: launchctl print system/com.apple.smbd 2>&1 | grep -E "^\s+state\s*=" | head -1
  register: smbd_status
  failed_when: false
  changed_when: false
  become: true

- name: "File Sharing (SMB) — habilitar e iniciar (best-effort)"
  ansible.builtin.shell:
    cmd: |
      set +e
      launchctl bootstrap system /System/Library/LaunchDaemons/com.apple.smbd.plist 2>/dev/null
      launchctl load -w /System/Library/LaunchDaemons/com.apple.smbd.plist 2>/dev/null
      launchctl enable system/com.apple.smbd 2>/dev/null
      launchctl kickstart -k system/com.apple.smbd 2>/dev/null
      exit 0
  when: smbd_status.stdout is not search('state\s*=\s*running')
  become: true
  register: smbd_enable

- name: "File Sharing (SMB) — re-validar estado após tentativa"
  ansible.builtin.shell:
    cmd: launchctl print system/com.apple.smbd 2>&1 | grep -E "^\s+state\s*=" | head -1
  register: smbd_status_after
  failed_when: false
  changed_when: false
  become: true
  when: smbd_status.stdout is not search('state\s*=\s*running')

- name: "File Sharing (SMB) — aviso se não habilitou"
  ansible.builtin.debug:
    msg:
      - "AVISO: File Sharing (SMB) não foi habilitado automaticamente."
      - "Estado final: {{ smbd_status_after.stdout | default('NOT_FOUND') | trim }}"
      - "Em macOS Tahoe/Sequoia, automação de SMB pode falhar por restrições de SIP/SSV."
      - "Habilite manualmente: System Settings > General > Sharing > File Sharing"
  when:
    - smbd_status.stdout is not search('state\s*=\s*running')
    - smbd_status_after.stdout is defined
    - smbd_status_after.stdout is not search('state\s*=\s*running')

# ── Resumo ─────────────────────────────────────────────────────────────────

- name: "Sharing — resumo"
  ansible.builtin.debug:
    msg:
      - "Hostname desejado: {{ target_hostname }}"
      - "ComputerName atual:  {{ computer_name_current.stdout | trim | default('?') }}"
      - "HostName atual:      {{ host_name_current.stdout | trim | default('?') }}"
      - "LocalHostName atual: {{ local_host_name_current.stdout | trim | default('?') }}"
      - "Após mudança de hostname, abrir nova sessão de terminal para o prompt refletir."
