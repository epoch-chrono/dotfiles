---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/main.yml — entry point por domínio
# ────────────────────────────────────────────────────────────────────────────
# Esta role roda apenas em macOS (controlado pelo `when` no site.yml).
# Cada domínio tem seu próprio arquivo + tag, permitindo runs cirúrgicos:
#
#   ansible-playbook site.yml --tags general
#   ansible-playbook site.yml --tags 'finder,keyboard'
#
# Cada tasks/<dominio>.yml itera sobre o array <dominio>_defaults definido
# em defaults/main.yml.
#
# Handlers em handlers/main.yml restartam cfprefsd/Finder/Dock/SystemUIServer
# ao final do play, MAS apenas quando alguma task notifying reportou changed.
# ────────────────────────────────────────────────────────────────────────────

- name: "Importar tasks de General (locale, idioma, software update)"
  ansible.builtin.import_tasks: general.yml
  tags:
    - general

- name: "Importar tasks de Appearance (tema, accent, highlight, sidebar)"
  ansible.builtin.import_tasks: appearance.yml
  tags:
    - appearance

- name: "Importar tasks de Finder"
  ansible.builtin.import_tasks: finder.yml
  tags:
    - finder

- name: "Importar tasks de Keyboard"
  ansible.builtin.import_tasks: keyboard.yml
  tags:
    - keyboard
