---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/tasks/main.yml — dispatcher
# ────────────────────────────────────────────────────────────────────────────
# Cada tasks/<scope>.yml itera sobre macos_defaults_<scope> em
# defaults/main.yml. Tags permitem runs cirúrgicos:
#
#   ansible-playbook site.yml --tags general    # só general
#   ansible-playbook site.yml --tags keyboard   # só keyboard
#   ansible-playbook site.yml --tags macos-base # tudo da role
#
# A role inteira só executa em macOS (when no site.yml).
# ────────────────────────────────────────────────────────────────────────────

- name: "macos-base — General (Date/Time, Language/Region, autocorrect)"
  ansible.builtin.import_tasks: general.yml
  tags:
    - general

- name: "macos-base — Keyboard"
  ansible.builtin.import_tasks: keyboard.yml
  tags:
    - keyboard

- name: "macos-base — Finder"
  ansible.builtin.import_tasks: finder.yml
  tags:
    - finder
