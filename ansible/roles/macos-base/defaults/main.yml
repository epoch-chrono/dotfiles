---
# ────────────────────────────────────────────────────────────────────────────
# roles/macos-base/defaults/main.yml — defaults declarativos por domínio
# ────────────────────────────────────────────────────────────────────────────
# Cada domínio tem seu próprio array, consumido pelo respectivo
# tasks/<dominio>.yml. Para sobrescrever, definir o array em
# group_vars/all.yml ou em vars/local.yml (gitignored).
#
# Schema de cada item:
#   description: comentário em PT-BR (não usado pelo módulo, é documentação)
#   domain:      domínio (NSGlobalDomain, com.apple.<app>, ou path absoluto
#                como /Library/Preferences/com.apple.SoftwareUpdate para
#                defaults sistêmicos)
#   key:         chave dentro do domínio
#   type:        int | bool | string | array | dict | float
#   value:       valor a escrever
#   rollback:    comando para reverter (documentação, não usado)
# ────────────────────────────────────────────────────────────────────────────

# ── General ────────────────────────────────────────────────────────────────
# Locale, idioma, formatos numéricos/data, calendário, atualizações.
general_defaults:

  - description: "Formato 24h em todo o sistema"
    domain: NSGlobalDomain
    key: AppleICUForce24HourTime
    type: bool
    value: true
    rollback: "defaults delete NSGlobalDomain AppleICUForce24HourTime"

  - description: "Idiomas preferidos em ordem (English primário, Portuguese-BR secundário)"
    domain: NSGlobalDomain
    key: AppleLanguages
    type: array
    value:
      - en-US
      - pt-BR
    rollback: "defaults delete NSGlobalDomain AppleLanguages"

  - description: "Locale: Inglês com formatos brasileiros (data, número, moeda)"
    domain: NSGlobalDomain
    key: AppleLocale
    type: string
    value: "en_BR"
    rollback: "defaults delete NSGlobalDomain AppleLocale"

  - description: "Temperatura em Celsius"
    domain: NSGlobalDomain
    key: AppleTemperatureUnit
    type: string
    value: "Celsius"
    rollback: "defaults delete NSGlobalDomain AppleTemperatureUnit"

  - description: "Sistema métrico habilitado"
    domain: NSGlobalDomain
    key: AppleMetricUnits
    type: bool
    value: true
    rollback: "defaults delete NSGlobalDomain AppleMetricUnits"

  - description: "Unidade de medida em centímetros"
    domain: NSGlobalDomain
    key: AppleMeasurementUnits
    type: string
    value: "Centimeters"
    rollback: "defaults delete NSGlobalDomain AppleMeasurementUnits"

# Nota: AppleFirstWeekday é dict ({gregorian: 1}) e o osx_defaults do
# community.general 10.x não suporta type: dict (suporte adicionado só na
# 11.x, que requer ansible-core 2.16+ — incompatível com Python 3.9 do CLT).
# Aplicado via tasks/general.yml usando 'defaults write -dict-add' direto.

# ── Appearance ─────────────────────────────────────────────────────────────
# Tema, accent color, highlight color, sidebar icon size.
#
# AppleInterfaceStyle (Light/Dark fixo) é tratado como state: absent em
# tasks/appearance.yml, fora deste array, porque osx_defaults com
# state: absent + value não combina bem com loop de items.
appearance_defaults:

  - description: "Auto switching entre Light e Dark mode (segue horário do sistema)"
    domain: NSGlobalDomain
    key: AppleInterfaceStyleSwitchesAutomatically
    type: bool
    value: true
    rollback: "defaults delete NSGlobalDomain AppleInterfaceStyleSwitchesAutomatically"

  - description: "Cor de destaque do sistema: Purple (5). Mapeamento: -1 graphite, 0 red, 1 orange, 2 yellow, 3 green, 4 blue, 5 purple, 6 pink"
    domain: NSGlobalDomain
    key: AppleAccentColor
    type: int
    value: 5
    rollback: "defaults delete NSGlobalDomain AppleAccentColor"

  - description: "Cor de seleção de texto: Purple (RGB 0.968627 0.831373 1.000000)"
    domain: NSGlobalDomain
    key: AppleHighlightColor
    type: string
    value: "0.968627 0.831373 1.000000 Purple"
    rollback: "defaults delete NSGlobalDomain AppleHighlightColor"

  - description: "Tamanho dos ícones da sidebar: Small (1=small, 2=medium, 3=large)"
    domain: NSGlobalDomain
    key: NSTableViewDefaultSizeMode
    type: int
    value: 1
    rollback: "defaults delete NSGlobalDomain NSTableViewDefaultSizeMode"

# ── Software Update ────────────────────────────────────────────────────────
# Preferências sistêmicas (path /Library/Preferences/...) — requer sudo.
# Aplicado via task com become: true em tasks/general.yml.
software_update_defaults:

  - description: "Verificação automática de novas atualizações"
    domain: /Library/Preferences/com.apple.SoftwareUpdate
    key: AutomaticCheckEnabled
    type: bool
    value: true

  - description: "Download automático de atualizações disponíveis"
    domain: /Library/Preferences/com.apple.SoftwareUpdate
    key: AutomaticDownload
    type: bool
    value: true

  - description: "Instalação automática de atualizações de macOS"
    domain: /Library/Preferences/com.apple.SoftwareUpdate
    key: AutomaticallyInstallMacOSUpdates
    type: bool
    value: true

  - description: "Instalação automática de dados de configuração (XProtect, MRT)"
    domain: /Library/Preferences/com.apple.SoftwareUpdate
    key: ConfigDataInstall
    type: bool
    value: true

  - description: "Instalação automática de atualizações críticas/segurança"
    domain: /Library/Preferences/com.apple.SoftwareUpdate
    key: CriticalUpdateInstall
    type: bool
    value: true

# ── Finder ─────────────────────────────────────────────────────────────────
finder_defaults:

  - description: "Mostrar extensões em todos os arquivos (mesmo conhecidos)"
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
    rollback: "defaults delete NSGlobalDomain AppleShowAllExtensions"

  - description: "Mostrar arquivos ocultos no Finder (.DS_Store, .git, .config etc.)"
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true
    rollback: "defaults delete com.apple.finder AppleShowAllFiles"

  - description: "Mostrar barra de caminho na parte inferior do Finder"
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true
    rollback: "defaults delete com.apple.finder ShowPathbar"

  - description: "Mostrar barra de status (contagem de itens, espaço livre)"
    domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true
    rollback: "defaults delete com.apple.finder ShowStatusBar"

# ── Keyboard ───────────────────────────────────────────────────────────────
keyboard_defaults:

  - description: "Velocidade de repetição de tecla (default macOS=6, menor=mais rápido)"
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 2
    rollback: "defaults delete NSGlobalDomain KeyRepeat"

  - description: "Delay antes de iniciar repetição (default macOS=25, menor=mais curto)"
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15
    rollback: "defaults delete NSGlobalDomain InitialKeyRepeat"

  - description: "Full Keyboard Access — Tab navega por TODOS os controles (3=full, 2=text/lists)"
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 3
    rollback: "defaults delete NSGlobalDomain AppleKeyboardUIMode"
