---
# =============================================================================
# ansible/roles/macos-apps-extra/defaults/main.yml
# =============================================================================
# Configurações de apps macOS que NÃO estão no brew nem na MAS:
#   - URLs voláteis (pCloud é o caso clássico — link do CDN muda cada release)
#   - Distribuição como PKG/DMG direto do fornecedor
#   - Apps proprietários sem cask oficial nem disponibilizados via App Store
#
# Cada app é uma entrada com:
#   name           — display name (label, debug msg)
#   app_path       — path absoluto em /Applications/ pra check idempotência
#   download_url   — URL direta OU 'dynamic:<task_name>' pra resolução em runtime
#   pkg_filename   — nome do arquivo baixado (também usado no installer)
#   tasks_file     — nome do arquivo de tasks (em tasks/<file>.yml)
#
# Pra adicionar um novo app: criar tasks/<app>.yml + adicionar entry aqui.

macos_apps_extra:
  - name: "pCloud Drive"
    app_path: "/Applications/pCloud Drive.app"
    tasks_file: "pcloud.yml"
    notes: "API pública resolve URL atualizada do PKG (cada release muda)"

# Adicionar futuros apps aqui:
#  - name: "Some App"
#    app_path: "/Applications/Some App.app"
#    tasks_file: "some-app.yml"

# ─── pCloud-specific config ─────────────────────────────────────────────────
# Código público da API pCloud que aponta pro download do pCloud Drive para
# macOS. A versão 3.x (kext via osxfuse/FUSE) foi descontinuada pelo pCloud —
# a API não aceita mais o código antigo XZNF4C7Zrqw256sL45jrAn7RhtDVnkKAlOw7
# (que apontava pra 3.7.9).
#
# Versão atual: 4.0.11 (UNIVERSAL.pkg, ~53MB).
#   - Usa FileProvider Extension nativo do macOS (sem kext)
#   - NÃO requer Reduced Security + Recovery Mode em Apple Silicon
#   - Setup post-install (login, Drive folder, extension approval) segue
#     manual — ver MacZeroToHero runbook
#
# Quando o pCloud lançar nova versão e a API começar a falhar, atualizar o
# código abaixo. Pra descobrir o código atual:
#
#   curl -s "https://www.pcloud.com/release-notes/mac-os.html" \
#     -A "Mozilla/5.0" \
#     | python3 -c '
#   import sys, re
#   html = sys.stdin.read()
#   # Procura a primeira entrada (versão mais recente) na página
#   m = re.search(r"(4\.\d+\.\d+).*?code=([A-Za-z0-9]+)", html, re.DOTALL)
#   if m: print(f"Versão: {m.group(1)}  Código: {m.group(2)}")'
#
# Sanity check: curl -s "https://api.pcloud.com/getpublinkdownload?code=<X>" \
#                 | jq -r .path

pcloud_api_url: "https://api.pcloud.com/getpublinkdownload"
pcloud_api_code: "XZsM0O5ZJ3t7mlu0PahirlgvRfmLl0GNMWMy"  # 4.0.11 (04/05/2026)
