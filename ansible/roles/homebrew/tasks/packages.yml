---
# ────────────────────────────────────────────────────────────────────────────
# roles/homebrew/tasks/packages.yml — aplicar Brewfile (taps + formulas)
# ────────────────────────────────────────────────────────────────────────────
# Estratégia:
#   1. Pré-condição: /opt/homebrew/bin/brew existe (garantido por install.yml).
#   2. Rodar `brew bundle --no-upgrade --file=<role>/files/Brewfile`.
#      - --no-upgrade: não tenta atualizar formulas existentes. Brew bundle
#        sem essa flag tenta `brew upgrade` em tudo a cada run, virando
#        rolling update — ruim pra reprodutibilidade. Com a flag, só
#        instala o que falta. Updates ficam manuais (`brew upgrade X`).
#      - --file: path absoluto pro Brewfile no checkout do repo. Como
#        rodamos com connection: local, role_path resolve no filesystem
#        local — não precisa copiar o Brewfile pra outro lugar.
#   3. Detectar mudança via parsing do stdout:
#      - "Installing X"  → formula nova instalada
#      - "Tapping X"     → tap novo adicionado
#      - "Using X"       → formula já estava lá (ok, sem mudança)
#
# Notas:
#   - become: false. brew bundle não precisa de root; quando uma formula
#     individual precisa (ex: instalação de daemon), brew aciona sudo
#     internamente (e NOPASSWD do bootstrap cobre).
#   - failed_when usa rc — brew bundle retorna 0 em sucesso, !=0 em falha.
#     Conservador, pois um único pacote pode falhar e o bundle inteiro
#     ainda relatar erro útil no stderr.
# ────────────────────────────────────────────────────────────────────────────

- name: "Homebrew — confirmar que o binary existe antes de aplicar Brewfile"
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew_binary_check

- name: "Homebrew — abortar se brew não está instalado"
  ansible.builtin.fail:
    msg: |
      /opt/homebrew/bin/brew não encontrado. Algo deu errado na role
      install.yml. Não vai dar pra aplicar o Brewfile.
  when: not brew_binary_check.stat.exists


# ── MAS cleanup ─────────────────────────────────────────────────────────
# Remove apps Apple "lixo" auto-instalados antes do brew bundle aplicar a
# lista de apps MAS declarados. Lista editável em defaults/main.yml.
#
# Pré-req: mas-cli (binary). Como `mas` está declarado no Brewfile mas
# o bundle ainda não rodou neste play, garantimos ele explicitamente
# antes do cleanup. `brew install mas` é idempotente (skip se já existe).

- name: "Homebrew — verificar se mas-cli está instalado"
  ansible.builtin.stat:
    path: /opt/homebrew/bin/mas
  register: mas_cli_check

- name: "Homebrew — instalar mas-cli (pre-req do MAS cleanup)"
  ansible.builtin.command: /opt/homebrew/bin/brew install mas
  when: not mas_cli_check.stat.exists
  changed_when: true

- name: "MAS — listar apps instalados (pra cleanup)"
  ansible.builtin.command: /opt/homebrew/bin/mas list
  register: mas_installed_list
  changed_when: false

- name: "MAS — remover apps Apple default (Garageband, iMovie, Keynote, Numbers, Pages)"
  ansible.builtin.command: "/opt/homebrew/bin/mas uninstall {{ item.id }}"
  become: true
  loop: "{{ mas_apps_to_remove }}"
  loop_control:
    label: "{{ item.name }} (id: {{ item.id }})"
  when: item.id in mas_installed_list.stdout
  changed_when: true


# ── Brew bundle apply ───────────────────────────────────────────────────

- name: "Homebrew — aplicar Brewfile (taps + formulas + casks + mas)"
  ansible.builtin.command:
    cmd: >-
      /opt/homebrew/bin/brew bundle
      --no-upgrade
      --file={{ role_path }}/files/Brewfile
  register: brew_bundle_result
  changed_when: >-
    'Installing ' in brew_bundle_result.stdout
    or 'Tapping ' in brew_bundle_result.stdout

- name: "Homebrew — exibir resumo do brew bundle"
  ansible.builtin.debug:
    msg: "{{ brew_bundle_result.stdout_lines }}"
