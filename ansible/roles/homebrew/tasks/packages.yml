---
# ────────────────────────────────────────────────────────────────────────────
# roles/homebrew/tasks/packages.yml
# ────────────────────────────────────────────────────────────────────────────
# Ordem das fases:
#   1. Pré-check: /opt/homebrew/bin/brew existe (garantido por install.yml).
#   2. mas-cli: garantir o binary instalado (pré-req das fases 3, 5 e 6).
#   3. MAS cleanup: remover apps Apple "lixo" (state: absent).
#   4. Brew bundle: aplicar Brewfile (taps + formulas + casks).
#      Importante: MAS apps NÃO estão mais no Brewfile — saíram pra cá
#      porque brew bundle chama mas-cli em contexto SSH non-interactive
#      e falha intermitentemente.
#   5. MAS install: instalar apps MAS declarados (state: present) via
#      community.general.mas. Failed_when permissivo: bootstrap segue
#      mesmo se um app individual falhar (ex: Apple ID nunca clicou
#      "Get" em algum app).
#   6. MAS upgrade: upgrade_all de todos os apps MAS instalados.
#      Inclui apps fora do mas_apps_to_install (manualmente instalados).
#      Diferença consciente do brew (--no-upgrade): MAS não tem release
#      management equivalente; modelo "update sempre" é o esperado.
# ────────────────────────────────────────────────────────────────────────────


# ── 1. Pré-check ──────────────────────────────────────────────────────────

- name: "Homebrew — confirmar que o binary existe antes de aplicar Brewfile"
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew_binary_check

- name: "Homebrew — abortar se brew não está instalado"
  ansible.builtin.fail:
    msg: |
      /opt/homebrew/bin/brew não encontrado. Algo deu errado na role
      install.yml. Não vai dar pra aplicar o Brewfile.
  when: not brew_binary_check.stat.exists


# ── 2. mas-cli pre-flight ─────────────────────────────────────────────────
# Pré-req do MAS cleanup (fase 3) e MAS install (fase 5). Idempotente —
# `brew install mas` é no-op se já instalado.

- name: "Homebrew — verificar se mas-cli está instalado"
  ansible.builtin.stat:
    path: /opt/homebrew/bin/mas
  register: mas_cli_check

- name: "Homebrew — instalar mas-cli (pre-req do MAS cleanup e install)"
  ansible.builtin.command: /opt/homebrew/bin/brew install mas
  when: not mas_cli_check.stat.exists
  changed_when: true


# ── 3. MAS cleanup ────────────────────────────────────────────────────────
# Remove apps Apple "lixo" auto-instalados antes do brew bundle aplicar.
# Lista editável em defaults/main.yml.
#
# state: absent + become: true (uninstall requer root).
# Idempotente: módulo verifica estado antes de agir; já-removido = no-op.

- name: "MAS — remover apps Apple default (state: absent)"
  community.general.mas:
    id: "{{ item.id }}"
    state: absent
  become: true
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_env.PATH }}"
  loop: "{{ mas_apps_to_remove }}"
  loop_control:
    label: "{{ item.name }} (id: {{ item.id }})"


# ── 4. Brew bundle apply ──────────────────────────────────────────────────
# Aplica taps + formulas + casks. MAS apps NÃO estão no Brewfile.
#
# Removido --no-upgrade nesta versão: agora cada run do bootstrap mantém
# as formulas atualizadas. Trade-off: bootstrap pode demorar um pouco
# mais quando há upgrades pendentes; ganho: tools não ficam outdated
# entre runs. Mise antes reclamava de versões mais novas porque brew
# instalava na 1ª run e nunca mais atualizava.
#
# Casks com auto_updates=true (ex.: VSCode, Chrome) ainda são pulados
# por brew bundle — esses são cobertos pela task `brew upgrade --cask
# --greedy` abaixo.

- name: "Homebrew — aplicar Brewfile (taps + formulas + casks)"
  ansible.builtin.command:
    cmd: >-
      /opt/homebrew/bin/brew bundle
      --file={{ role_path }}/files/Brewfile
  register: brew_bundle_result
  changed_when: >-
    'Installing ' in brew_bundle_result.stdout
    or 'Tapping ' in brew_bundle_result.stdout
    or 'Upgrading ' in brew_bundle_result.stdout

- name: "Homebrew — exibir resumo do brew bundle"
  ansible.builtin.debug:
    msg: "{{ brew_bundle_result.stdout_lines }}"


# ── 4b. Brew upgrade --cask --greedy ──────────────────────────────────────
# Brew bundle ignora upgrade de casks que têm `auto_updates true` (apps
# que se atualizam sozinhos: VSCode, Chrome, Discord, etc.) ou
# `version :latest`. Esses ficam "presos" na versão do primeiro install
# do brew bundle — o app pode até auto-atualizar internamente, mas o
# brew metadata fica desatualizado, e ferramentas que verificam via brew
# (mise, scripts de inventory) reportam outdated.
#
# `brew upgrade --cask --greedy` força reinstall desses casks pra puxar
# o latest metadata + versão.
#
# Sobre as 3 flags --greedy* do brew upgrade --cask:
#   --greedy                — outdated casks com auto_updates=true OU
#                             version=:latest (UNIÃO de ambos — mais amplo)
#   --greedy-auto-updates   — apenas casks com auto_updates=true
#   --greedy-latest         — apenas casks com version=:latest
# Usamos --greedy que é a UNIÃO: cobre ambos os casos sem precisar
# segunda passada. Equivalente a "--greedy-auto-updates --greedy-latest"
# juntos.
#
# brew bundle issue #897 (aberto) pede pra suportar `--greedy` direto
# no Brewfile via sintaxe per-cask (`cask "x", greedy: true`) ou DSL
# global; até lá, fazemos via task separada.
#
# failed_when: false — alguns casks podem dar erro de checksum ou
# changed-arch e isso não deve quebrar o bootstrap inteiro.

- name: "Homebrew — upgrade --cask --greedy (casks com auto_updates / :latest)"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/brew upgrade --cask --greedy
  register: brew_cask_greedy_result
  changed_when: >-
    'Upgrading ' in brew_cask_greedy_result.stdout
    or 'Pouring ' in brew_cask_greedy_result.stdout
  failed_when: false

- name: "Homebrew — exibir resumo do greedy cask upgrade"
  ansible.builtin.debug:
    msg: >-
      {{ brew_cask_greedy_result.stdout_lines
         if brew_cask_greedy_result.changed
         else 'Nenhum cask precisava upgrade --greedy' }}


# ── 5. MAS install ────────────────────────────────────────────────────────
# Instala apps MAS declarados em mas_apps_to_install (defaults/main.yml).
#
# Resiliência:
#   - failed_when: false → cada app é independente. Se um falha, os
#     outros são tentados. Bootstrap não derruba.
#   - Sumário no final lista quais OK e quais falharam, com motivo.
#
# Pré-req: Apple ID logada na MAS via GUI. Em macOS 12+ a Apple desativou
# sign-in via CLI; usuário deve abrir App Store e logar antes do bootstrap.

- name: "MAS — instalar apps declarados (state: present)"
  community.general.mas:
    id: "{{ item.id }}"
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_env.PATH }}"
  loop: "{{ mas_apps_to_install }}"
  loop_control:
    label: "{{ item.name }} (id: {{ item.id }})"
  register: mas_install_result
  failed_when: false

- name: "MAS — sumário de instalação"
  ansible.builtin.debug:
    msg: >-
      {{ item.item.name }} ({{ item.item.id }}):
      {{ 'OK' if not (item.failed | default(false)) else 'FAIL — ' + (item.msg | default('sem mensagem') | string) }}
  loop: "{{ mas_install_result.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: "MAS — contar apps que falharam"
  ansible.builtin.set_fact:
    mas_failed_apps: >-
      {{ mas_install_result.results
         | selectattr('failed', 'defined')
         | selectattr('failed')
         | list }}

- name: "MAS — avisar se houve falhas (não-bloqueante)"
  ansible.builtin.debug:
    msg: |
      ⚠ {{ mas_failed_apps | length }} de {{ mas_apps_to_install | length }} apps MAS falharam.
      Causas comuns:
        - Apple ID nunca clicou "Get" no app via GUI da App Store.
        - macOS 12+ desativou sign-in via CLI; precisa logar antes via GUI.
      Pra resolver:
        1. Abrir App Store, buscar cada app que falhou, clicar "Get".
        2. Re-rodar bootstrap.
  when: mas_failed_apps | length > 0


# ── 6. MAS upgrade ────────────────────────────────────────────────────────
# Upgrade de TODOS os apps MAS instalados (incluindo apps que o user
# instalou manualmente fora do mas_apps_to_install — boa hygiene).
#
# Diferença consciente do brew: brew bundle usa --no-upgrade pra
# reprodutibilidade (versões pinadas via Brewfile). MAS não tem release
# management equivalente — apps são distribuídos via Apple, modelo
# "update sempre". Pra Safari extensions especificamente, ter a versão
# mais recente importa por segurança.
#
# failed_when: false: upgrades podem falhar por razões transitórias
# (rede, app individual, etc). Não derrubar bootstrap por isso.

- name: "MAS — upgrade de todos os apps MAS instalados"
  community.general.mas:
    upgrade_all: true
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_env.PATH }}"
  register: mas_upgrade_result
  failed_when: false

- name: "MAS — exibir resumo do upgrade"
  ansible.builtin.debug:
    msg: >-
      {{ 'Upgrade aplicado em ' + (mas_upgrade_result.msg | default('todos os apps')) | string
         if mas_upgrade_result.changed
         else 'Nenhum upgrade necessário (todos os apps já estão na versão mais recente)' }}
